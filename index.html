<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fan Field — Inventory Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
:root{
--primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#dbeafe;
--secondary:#059669;--secondary-light:#d1fae5;
--warning:#d97706;--warning-light:#fef3c7;
--danger:#dc2626;--danger-light:#fee2e2;
--purple:#7c3aed;--purple-light:#ede9fe;
--bg:#f1f5f9;--surface:#fff;--surface-hover:#f8fafc;
--border:#e2e8f0;--text:#0f172a;--text-sec:#475569;--text-muted:#94a3b8;
--sidebar-bg:#0f172a;--sidebar-text:#cbd5e1;
--radius:12px;--radius-sm:8px;
--shadow:0 1px 3px rgba(0,0,0,.08);
--shadow-md:0 4px 6px -1px rgba(0,0,0,.07);
--shadow-lg:0 10px 15px -3px rgba(0,0,0,.08);
--transition:all .2s ease;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:260px;background:var(--sidebar-bg);color:var(--sidebar-text);position:fixed;top:0;left:0;bottom:0;z-index:1000;transition:transform .3s;overflow-y:auto;display:flex;flex-direction:column}
.sb-header{padding:22px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{display:flex;align-items:center;gap:12px}
.sb-logo .icon{width:42px;height:42px;background:linear-gradient(135deg,var(--primary),#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}
.sb-logo h1{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.3px}
.sb-logo p{font-size:10px;color:var(--text-muted);margin-top:1px}
.sb-nav{padding:12px 0;flex:1}
.nav-section{padding:0 14px;margin-bottom:4px}
.nav-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:8px 12px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;margin:2px 0;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);font-size:13px;font-weight:500;color:var(--sidebar-text);user-select:none}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--primary);color:#fff}
.nav-item i{width:18px;text-align:center;font-size:13px}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}

/* MAIN */
.main{margin-left:260px;flex:1;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:14px}
.menu-toggle{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text);padding:4px}
.page-title h2{font-size:18px;font-weight:700;letter-spacing:-.3px}
.page-title p{font-size:11px;color:var(--text-muted)}
.topbar-right{display:flex;align-items:center;gap:10px}
.sync-status{font-size:11px;color:var(--text-muted)}
.btn-icon{padding:8px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;transition:var(--transition);color:var(--text-sec)}
.btn-icon:hover{border-color:var(--primary);color:var(--primary)}
.content{padding:28px}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:20px;border:1px solid var(--border);transition:var(--transition)}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.stat-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stat-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
.stat-icon.blue{background:var(--primary-light);color:var(--primary)}
.stat-icon.green{background:var(--secondary-light);color:var(--secondary)}
.stat-icon.orange{background:var(--warning-light);color:var(--warning)}
.stat-icon.red{background:var(--danger-light);color:var(--danger)}
.stat-icon.purple{background:var(--purple-light);color:var(--purple)}
.stat-val{font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:2px}
.stat-label{font-size:12px;color:var(--text-muted);font-weight:500}

/* CARDS */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:22px}
.card-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.card-hdr h3{font-size:15px;font-weight:700}
.card-body{padding:22px}
.card-body.np{padding:0}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:var(--transition);font-family:inherit}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--secondary);color:#fff}
.btn-success:hover{background:#047857}
.btn-warning{background:var(--warning);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-outline{background:transparent;color:var(--text-sec);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:5px 10px;font-size:11.5px}
.btn-lg{padding:11px 22px;font-size:13.5px}
.btn-group{display:flex;gap:6px;flex-wrap:wrap}

/* TABLES */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
table th{background:var(--bg);padding:10px 14px;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);text-align:left;white-space:nowrap}
table td{padding:10px 14px;font-size:12.5px;border-bottom:1px solid var(--border);color:var(--text-sec)}
table tbody tr:hover{background:var(--surface-hover)}
.badge{padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.badge-s{background:var(--secondary-light);color:var(--secondary)}
.badge-w{background:var(--warning-light);color:var(--warning)}
.badge-d{background:var(--danger-light);color:var(--danger)}
.badge-i{background:var(--primary-light);color:var(--primary)}
.badge-p{background:var(--purple-light);color:var(--purple)}

/* FORMS */
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11.5px;font-weight:600;color:var(--text-sec);margin-bottom:5px}
.fc{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12.5px;font-family:inherit;transition:var(--transition);background:var(--surface);color:var(--text)}
.fc:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
select.fc{cursor:pointer}
textarea.fc{resize:vertical;min-height:70px}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:2000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);padding:4px}
.modal-close:hover{color:var(--danger)}
.modal-body{padding:22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* SEARCH */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.search-box{position:relative;flex:1;min-width:180px}
.search-box input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12.5px;font-family:inherit}
.search-box input:focus{outline:none;border-color:var(--primary)}
.search-box i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:12px}

/* STOCK BAR */
.stock-bar-c{width:70px;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:5px}
.stock-bar{height:100%;border-radius:3px;transition:width .3s}

/* CHART */
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:180px;padding-top:16px}
.chart-bw{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.chart-bar{width:100%;max-width:44px;background:linear-gradient(135deg,var(--primary),#8b5cf6);border-radius:6px 6px 0 0;min-height:3px;transition:height .5s}
.chart-bv{font-size:9.5px;font-weight:600;color:var(--text-sec);margin-bottom:3px}
.chart-bl{font-size:9.5px;color:var(--text-muted);margin-top:6px;font-weight:500}

/* DASH GRID */
.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:22px}
.dash-full{grid-column:1/-1}

/* SPINNER */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;padding:50px;gap:10px;color:var(--text-muted);font-size:13px}

/* TOAST */
.toast-container{position:fixed;top:16px;right:16px;z-index:5000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:var(--radius-sm);color:#fff;font-size:12.5px;font-weight:500;box-shadow:var(--shadow-lg);animation:slideIn .3s;max-width:340px;display:flex;align-items:center;gap:8px}
.toast-success{background:var(--secondary)}
.toast-error{background:var(--danger)}
.toast-warning{background:var(--warning)}
.toast-info{background:var(--primary)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* INVOICE */
.inv-preview{border:1px solid var(--border);border-radius:var(--radius);padding:28px;background:#fff}
.inv-hdr-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:20px;border-bottom:3px solid var(--primary)}
.inv-brand h2{font-size:26px;font-weight:900;color:var(--primary)}
.inv-brand .motto{font-size:11px;color:var(--text-sec);font-style:italic;margin:2px 0 6px}
.inv-brand p{font-size:11px;color:var(--text-muted);margin:1px 0}
.inv-meta{text-align:right}
.inv-meta h3{font-size:20px;color:var(--text);margin-bottom:6px}
.inv-meta p{font-size:11px;color:var(--text-sec);margin:2px 0}
.inv-parties{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:28px}
.inv-parties h4{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:6px}
.inv-parties p{font-size:12px;color:var(--text-sec);margin:1px 0}
.inv-parties .name{font-weight:700;font-size:14px;color:var(--text)}
.inv-table th{background:var(--primary);color:#fff;font-size:10.5px}
.inv-table td{font-size:12px}
.inv-totals{display:flex;justify-content:flex-end;margin-top:20px}
.inv-totals table{width:280px}
.inv-totals td{padding:6px 10px;font-size:12px}
.inv-totals tr:last-child td{font-weight:700;font-size:15px;border-top:2px solid var(--text)}
.inv-footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--border);text-align:center;font-size:10.5px;color:var(--text-muted)}

/* SALE ITEMS TABLE */
.si-tbl input,.si-tbl select{padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:11.5px;font-family:inherit;width:100%}
.si-tbl input:focus,.si-tbl select:focus{outline:none;border-color:var(--primary)}
.si-tbl .cb{width:auto;margin:0}

/* PAGE SECTIONS */
.page{display:none}
.page.active{display:block}

/* RESPONSIVE */
@media(max-width:1024px){.dash-grid{grid-template-columns:1fr}}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .menu-toggle{display:block}
  .content{padding:14px}
  .topbar{padding:10px 14px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .fg{grid-template-columns:1fr}
  .modal{max-width:100%;margin:8px}
}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr}.toolbar{flex-direction:column;align-items:stretch}}
@media print{
  .sidebar,.topbar,.no-print{display:none!important}
  .main{margin-left:0}
  .content{padding:0}
  .card{border:none;box-shadow:none}
  .inv-preview{border:none;padding:0}
}
</style>
</head>

const API_URL = 'https://script.google.com/macros/s/AKfycbwJXo9VOqP6x-PVoJA5h7kZm-12Dy7wWP_NHl4GrcUy62Ea-NyOwmuC2-U7yEcstU_l/exec';

// ============================================================
// API HELPERS
// ============================================================
async function apiGet(action, params={}) {
  setSS('Syncing...');
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  for(const k in params) url.searchParams.set(k, params[k]);
  try {
    const r = await fetch(url.toString());
    const d = await r.json();
    if(d.error) { toast(d.error,'error'); setSS('Error'); return d; }
    setSS('Synced ✓');
    return d;
  } catch(e) { setSS('Offline'); toast('Connection error','error'); throw e; }
}
async function apiPost(action, payload) {
  setSS('Saving...');
  try {
    const r = await fetch(API_URL, { method:'POST', body:JSON.stringify({action,...payload}), headers:{'Content-Type':'text/plain'} });
    const d = await r.json();
    if(d.error) { toast('Error: '+d.error,'error'); setSS('Error'); return d; }
    setSS('Saved ✓');
    return d;
  } catch(e) { setSS('Offline'); toast('Connection error','error'); throw e; }
}
function setSS(t) { document.getElementById('syncSt').textContent=t; }

// ============================================================
// TOAST
// ============================================================
function toast(msg,type='success') {
  const c=document.getElementById('toastBox');
  const t=document.createElement('div');
  t.className='toast toast-'+type;
  const icons={success:'check-circle',error:'exclamation-circle',warning:'exclamation-triangle',info:'info-circle'};
  t.innerHTML=`<i class="fas fa-${icons[type]||'info-circle'}"></i>${msg}`;
  c.appendChild(t);
  setTimeout(()=>t.remove(),4500);
}

async function renderPage(page) {
  const area=document.getElementById('contentArea');

  try {

      case 'customers': await renderCustomers(area); break;
      case 'payments': await renderPayments(area); break;
      case 'suppliers': await renderSuppliers(area); break;
      case 'supplierLedger': await renderSupplierLedger(area); break;
      case 'expenses': await renderExpenses(area); break;
      case 'affiliates': await renderAffiliates(area); break;

function statusBadge(s){return s==='Paid'?'<span class="badge badge-s">Paid</span>':s==='Partial'?'<span class="badge badge-w">Partial</span>':s==='Unpaid'?'<span class="badge badge-d">Unpaid</span>':`<span class="badge badge-i">${s||'-'}</span>`}
function makeOptions(arr,sel=''){return arr.map(a=>`<option value="${a}" ${a===sel?'selected':''}>${a}</option>`).join('')}
function C(){return S.currency||'৳'}

async function renderInventory(area) {

    <select class="fc" style="width:auto" id="invStock" onchange="filterInv()"><option value="">All Stock</option><option value="low">Low</option><option value="out">Out</option><option value="ok">In Stock</option></select>
    <button class="btn btn-success" onclick="openAddBatchModal()"><i class="fas fa-layer-group"></i>Add Batch</button>
    <button class="btn btn-primary" onclick="openProductModal()"><i class="fas fa-plus"></i>Add Product</button>
  </div></div><div class="card-body np"><div class="tbl-wrap" id="invTbl"></div></div></div>`;
  filterInv();
}

function filterInv(){
  const srch=(document.getElementById('invSrch')?.value||'').toLowerCase();
  const cat=document.getElementById('invCat')?.value||'';
  const stk=document.getElementById('invStock')?.value||'';
  let data=S.inventory.filter(i=>{
    const ms=!srch||(i.ProductName||'').toLowerCase().includes(srch)||(i.Club_Country||'').toLowerCase().includes(srch)||(i.Edition||'').toLowerCase().includes(srch);
    const mc=!cat||i.Club_Country===cat;
    let mst=true;
    if(stk==='low')mst=Number(i.Stock)>0&&Number(i.Stock)<=Number(i.MinStock||5);
    else if(stk==='out')mst=Number(i.Stock)===0;
    else if(stk==='ok')mst=Number(i.Stock)>Number(i.MinStock||5);
    return ms&&mc&&mst;
  });
  renderInvTable(data);
}

function renderInvTable(data){
  const el=document.getElementById('invTbl');
  const c=C();
  if(!data.length){el.innerHTML='<div style="padding:30px;text-align:center;color:var(--text-muted)">No products found</div>';return}
  el.innerHTML=`<table><thead><tr><th>Product</th><th>Club/Country</th><th>Edition</th><th>Type</th><th>Size</th><th>Cost</th><th>Sell</th><th>Stock</th><th>Health</th><th>Supplier</th><th>Actions</th></tr></thead><tbody>${data.map(i=>{
    const stk=Number(i.Stock)||0;const mn=Number(i.MinStock)||5;const pct=Math.min(100,(stk/Math.max(mn*3,1))*100);
    const col=stk===0?'#dc2626':stk<=mn?'#d97706':'#059669';
    return`<tr><td><strong>${esc(i.ProductName)}</strong></td><td><span class="badge badge-i">${i.Club_Country||'-'}</span></td><td>${i.Edition||'-'}</td><td>${i.Type||'-'}</td><td>${i.Size||'-'}</td><td>${c}${Number(i.CostPrice).toLocaleString()}</td><td><strong>${c}${Number(i.SellPrice).toLocaleString()}</strong></td><td><strong>${stk}</strong></td><td><div class="stock-bar-c"><div class="stock-bar" style="width:${pct}%;background:${col}"></div></div>${stk===0?'<span class="badge badge-d">Out</span>':stk<=mn?'<span class="badge badge-w">Low</span>':'<span class="badge badge-s">OK</span>'}</td><td>${esc(i.SupplierName||'-')}</td><td><div class="btn-group"><button class="btn btn-outline btn-sm" onclick="openStockModal('${i.ID}',${stk})" title="Update Stock"><i class="fas fa-cubes"></i></button><button class="btn btn-outline btn-sm" onclick="editProduct('${i.ID}')" title="Edit"><i class="fas fa-pen"></i></button><button class="btn btn-danger btn-sm" onclick="delProduct('${i.ID}')" title="Delete"><i class="fas fa-trash"></i></button></div></td></tr>`;
  }).join('')}</tbody></table>`;
}

      <button class="btn btn-outline" onclick="clearPOS()"><i class="fas fa-eraser"></i>Clear</button>
      <button class="btn btn-success btn-lg" onclick="submitSale()"><i class="fas fa-check-circle"></i>Complete Sale & Generate Invoice</button>
    </div>
  </div></div>`;

  posItems=[];
  addPOSRow();
  // Auto-fill phone when customer selected
  document.getElementById('posCust').addEventListener('change',function(){
    const opt=this.selectedOptions[0];
    document.getElementById('posCustPhone').value=opt?.dataset.phone||'';
  });
}

function addPOSRow(){
  const tbody=document.getElementById('posItems');
  const tr=document.createElement('tr');
  const patchDef=S.settings.patchDefaultPrice||50;
  const nameDef=S.settings.namePrintDefaultPrice||100;
  tr.innerHTML=`<td><select class="pos-prod" onchange="onPOSProdChange(this)"><option value="">Select product</option>${S.inventory.map(p=>`<option value="${p.ID}" data-price="${p.SellPrice}" data-cost="${p.CostPrice}" data-name="${esc(p.ProductName)}" data-club="${p.Club_Country}" data-ed="${p.Edition}" data-type="${p.Type}" data-size="${p.Size}" data-stock="${p.Stock}">${esc(p.ProductName)} [${p.Stock}]</option>`).join('')}</select></td>
    <td><input type="checkbox" class="pos-patch cb" onchange="calcPOSTotal()"></td>
    <td><input class="pos-nameprint" placeholder="Name to print" oninput="calcPOSTotal()"></td>
    <td><input type="number" class="pos-patchprice" value="${patchDef}" onchange="calcPOSTotal()"></td>
    <td><input type="number" class="pos-nameprice" value="${nameDef}" onchange="calcPOSTotal()"></td>
    <td><input type="number" class="pos-price" value="0" onchange="calcPOSTotal()"></td>
    <td><input type="number" class="pos-cost" value="0" onchange="calcPOSTotal()"></td>
    <td><input type="number" class="pos-qty" value="1" min="1" onchange="calcPOSTotal()" style="width:60px"></td>
    <td><input class="pos-linetotal" value="0" readonly></td>
    <td><button class="btn btn-danger btn-sm" onclick="this.closest('tr').remove();calcPOSTotal()"><i class="fas fa-times"></i></button></td>`;
  tbody.appendChild(tr);
}

function onPOSProdChange(sel){
  const tr=sel.closest('tr');
  const opt=sel.selectedOptions[0];
  if(opt&&opt.value){
    tr.querySelector('.pos-price').value=opt.dataset.price||0;
    tr.querySelector('.pos-cost').value=opt.dataset.cost||0;
    tr.querySelector('.pos-qty').max=opt.dataset.stock||999;
  }
  calcPOSTotal();
}

function calcPOSTotal(){
  let subtotal=0,totalCost=0;
  document.querySelectorAll('#posItems tr').forEach(tr=>{
    const price=Number(tr.querySelector('.pos-price').value)||0;
    const cost=Number(tr.querySelector('.pos-cost').value)||0;
    const qty=Number(tr.querySelector('.pos-qty').value)||0;
    const hasPatch=tr.querySelector('.pos-patch').checked;
    const hasName=tr.querySelector('.pos-nameprint').value.trim()!=='';
    const patchP=hasPatch?(Number(tr.querySelector('.pos-patchprice').value)||0):0;
    const nameP=hasName?(Number(tr.querySelector('.pos-nameprice').value)||0):0;
    const lineTotal=(price*qty)+((patchP+nameP)*qty);
    tr.querySelector('.pos-linetotal').value=lineTotal;
    subtotal+=lineTotal;
    totalCost+=cost*qty;
  });

  const disc=Number(document.getElementById('posDisc').value)||0;

  // Affiliate - supports both percentage and fixed amount
  let affDisc=0;
  const affCode=document.getElementById('posAffCode').value.trim();
  if(affCode){
    const aff=S.affiliates.find(a=>a.Code.toLowerCase()===affCode.toLowerCase()&&a.Active==='Yes');
    if(aff){
      if(aff.DiscountType==='Fixed'){
        affDisc=Number(aff.DiscountValue)||0;
      } else {
        affDisc=Math.round(subtotal*(Number(aff.DiscountValue)||Number(aff.DiscountPercent)||0)/100);
      }
    }
  }
  document.getElementById('posAffDisc').value=affDisc;

  const grand=Math.max(0,subtotal-disc-affDisc);
  const paid=Number(document.getElementById('posPaid').value)||0;
  const due=Math.max(0,grand-paid);
  document.getElementById('posSub').value=subtotal;
  document.getElementById('posTotal').value=grand;
  document.getElementById('posDue').value=due;
}

function clearPOS(){
  document.getElementById('posCust').value='';document.getElementById('posCustPhone').value='';
  document.getElementById('posDisc').value=0;document.getElementById('posPaid').value=0;
  document.getElementById('posNotes').value='';document.getElementById('posAffCode').value='';
  document.getElementById('posItems').innerHTML='';posItems=[];addPOSRow();calcPOSTotal();
}

async function submitSale(){
  const items=[];
  document.querySelectorAll('#posItems tr').forEach(tr=>{
    const sel=tr.querySelector('.pos-prod');
    if(!sel.value)return;
    const opt=sel.selectedOptions[0];
    items.push({
      ProductID:sel.value,Club_Country:opt.dataset.club,Edition:opt.dataset.ed,Type:opt.dataset.type,Size:opt.dataset.size,
      Quantity:tr.querySelector('.pos-qty').value,UnitPrice:tr.querySelector('.pos-price').value,CostPrice:tr.querySelector('.pos-cost').value,
      Patch:tr.querySelector('.pos-patch').checked,PatchPrice:tr.querySelector('.pos-patchprice').value,
      NamePrint:tr.querySelector('.pos-nameprint').value,NamePrintPrice:tr.querySelector('.pos-nameprice').value
    });
  });
  if(!items.length){toast('Add at least one item','error');return}

  const custSel=document.getElementById('posCust');
  const custOpt=custSel.selectedOptions[0];
  const payload={
    CustomerID:custSel.value,
    CustomerName:custOpt?(custOpt.dataset.name||custOpt.textContent):'Walk-in Customer',
    CustomerPhone:document.getElementById('posCustPhone').value,
    Items:items,
    TotalAmount:document.getElementById('posSub').value,
    Discount:document.getElementById('posDisc').value,
    AffiliateCode:document.getElementById('posAffCode').value,
    AffiliateDiscount:document.getElementById('posAffDisc').value,
    PaidAmount:document.getElementById('posPaid').value,
    PaymentMethod:document.getElementById('posPayM').value,
    Notes:document.getElementById('posNotes').value
  };

  if(!confirm(`Complete sale of ${C()}${document.getElementById('posTotal').value}?`))return;
  const r=await apiPost('createSale',payload);
  if(r.success){
    toast(`Sale completed! Invoice: ${r.invoiceNo} | Profit: ${C()}${r.profit}`,'success');
    showInvoice(r.invoiceNo,payload,items);
    clearPOS();
    S.inventory=await apiGet('getInventory');
  }
}

        <div class="inv-meta"><h3>INVOICE</h3><p><strong>${invoiceNo}</strong></p><p>Date: ${new Date().toLocaleDateString()}</p><p>Time: ${new Date().toLocaleTimeString()}</p></div>

  const c=C();
  const pending=S.sales.filter(s=>Number(s.DueAmount)>0);

  area.innerHTML=`<div class="card"><div class="card-hdr"><h3><i class="fas fa-money-bill-wave" style="color:var(--warning);margin-right:6px"></i>Pending Payments (${pending.length})</h3></div>
    <div class="card-body np"><div class="tbl-wrap">${pending.length?`<table><thead><tr><th>Invoice</th><th>Customer</th><th>Total</th><th>Paid</th><th>Due</th><th>Status</th><th>Action</th></tr></thead><tbody>${pending.map(s=>`<tr>
      <td><strong>${s.InvoiceNo}</strong><br><small>${fmtD(s.Date)}</small></td><td>${esc(s.CustomerName||'Walk-in')}</td>
      <td>${c}${Number(s.FinalAmount).toLocaleString()}</td><td>${c}${Number(s.PaidAmount).toLocaleString()}</td>
      <td style="color:var(--danger);font-weight:700">${c}${Number(s.DueAmount).toLocaleString()}</td><td>${statusBadge(s.Status)}</td>
      <td><button class="btn btn-success btn-sm" onclick="openPayModal('${s.InvoiceNo}','${s.CustomerID}','${esc(s.CustomerName)}',${s.DueAmount})"><i class="fas fa-money-bill"></i>Pay</button></td>
    </tr>`).join('')}</tbody></table>`:'<div style="padding:30px;text-align:center;color:var(--secondary)"><i class="fas fa-check-circle"></i> No pending payments!</div>'}</div></div></div>

    <div class="card"><div class="card-hdr"><h3><i class="fas fa-history" style="color:var(--secondary);margin-right:6px"></i>All Payment Records</h3></div>
    <div class="card-body np"><div class="tbl-wrap">${S.payments.length?`<table><thead><tr><th>Date</th><th>Invoice</th><th>Customer</th><th>Amount</th><th>Method</th><th>Notes</th></tr></thead><tbody>${[...S.payments].reverse().map(p=>`<tr>
      <td>${fmtD(p.Date)}</td><td><strong>${p.InvoiceNo}</strong></td><td>${esc(p.CustomerName||'-')}</td>
      <td><strong style="color:var(--secondary)">${c}${Number(p.Amount).toLocaleString()}</strong></td>
      <td><span class="badge badge-i">${p.PaymentMethod}</span></td><td>${p.Notes||'-'}</td>
    </tr>`).join('')}</tbody></table>`:'<div style="padding:30px;text-align:center;color:var(--text-muted)">No records</div>'}</div></div></div>`;
}

function openPayModal(inv,custId,custName,due){
  let m=document.getElementById('payModal');if(m)m.remove();
  document.body.insertAdjacentHTML('beforeend',`<div class="modal-overlay" id="payModal"><div class="modal" style="max-width:500px"><div class="modal-hdr"><h3>Receive Payment</h3><button class="modal-close" onclick="closeModal('payModal')">&times;</button></div><div class="modal-body"><div class="fg">
    <div class="form-group"><label>Invoice</label><input class="fc" id="pyInv" value="${inv}" readonly></div>
    <div class="form-group"><label>Customer</label><input class="fc" id="pyCustN" value="${custName}" readonly></div>
    <input type="hidden" id="pyCustId" value="${custId}">
    <div class="form-group"><label>Due Amount</label><input class="fc" id="pyDue" value="${due}" readonly></div>
    <div class="form-group"><label>Amount *</label><input type="number" class="fc" id="pyAmt" value="${due}"></div>
    <div class="form-group"><label>Method</label><select class="fc" id="pyMethod">${makeOptions(PAY_METHODS)}</select></div>
    <div class="form-group"><label>Notes</label><input class="fc" id="pyNotes"></div>
  </div></div><div class="modal-foot"><button class="btn btn-outline" onclick="closeModal('payModal')">Cancel</button><button class="btn btn-success" onclick="submitPayment()"><i class="fas fa-check"></i>Receive</button></div></div></div>`);
  openModal('payModal');
}

async function submitPayment(){
  const data={InvoiceNo:document.getElementById('pyInv').value,CustomerID:document.getElementById('pyCustId').value,CustomerName:document.getElementById('pyCustN').value,Amount:document.getElementById('pyAmt').value,PaymentMethod:document.getElementById('pyMethod').value,Notes:document.getElementById('pyNotes').value};
  if(!data.Amount||Number(data.Amount)<=0){toast('Enter valid amount','error');return}
  const r=await apiPost('addPayment',data);
  if(r.success){toast('Payment received!');closeModal('payModal');S.sales=await apiGet('getSales');renderPage('payments')}
}

// ============================================================
// SUPPLIERS
// ============================================================
async function renderSuppliers(area){
  S.suppliers=await apiGet('getSuppliers');
  const c=C();
  area.innerHTML=`<div class="card"><div class="card-hdr"><div class="toolbar" style="width:100%">
    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="sSrch" placeholder="Search suppliers..." oninput="filterSup()"></div>
    <button class="btn btn-primary" onclick="openSupModal()"><i class="fas fa-plus"></i>Add Supplier</button>
  </div></div><div class="card-body np"><div class="tbl-wrap" id="sTbl"></div></div></div>`;
  filterSup();
}

function filterSup(){
  const srch=(document.getElementById('sSrch')?.value||'').toLowerCase();
  const data=S.suppliers.filter(s=>!srch||(s.Name||'').toLowerCase().includes(srch));
  const c=C();
  document.getElementById('sTbl').innerHTML=data.length?`<table><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Orders</th><th>Total</th><th>Pending</th><th>Actions</th></tr></thead><tbody>${data.map(s=>`<tr>
    <td><strong>${esc(s.Name)}</strong></td><td>${s.Phone||'-'}</td><td>${s.Email||'-'}</td><td>${s.TotalOrders||0}</td>
    <td>${c}${Number(s.TotalAmount||0).toLocaleString()}</td>
    <td style="color:${Number(s.PendingAmount)>0?'var(--danger)':'inherit'}">${c}${Number(s.PendingAmount||0).toLocaleString()}</td>
    <td><div class="btn-group"><button class="btn btn-outline btn-sm" onclick="editSup('${s.ID}')"><i class="fas fa-pen"></i></button><button class="btn btn-danger btn-sm" onclick="delSup('${s.ID}')"><i class="fas fa-trash"></i></button></div></td>
  </tr>`).join('')}</tbody></table>`:'<div style="padding:30px;text-align:center;color:var(--text-muted)">No suppliers</div>';
}

function openSupModal(sup=null){
  let m=document.getElementById('supModal');if(m)m.remove();
  document.body.insertAdjacentHTML('beforeend',`<div class="modal-overlay" id="supModal"><div class="modal"><div class="modal-hdr"><h3>${sup?'Edit':'Add'} Supplier</h3><button class="modal-close" onclick="closeModal('supModal')">&times;</button></div><div class="modal-body"><div class="fg">
    <div class="form-group"><label>Name *</label><input class="fc" id="suName" value="${sup?.Name||''}"></div>
    <div class="form-group"><label>Phone</label><input class="fc" id="suPhone" value="${sup?.Phone||''}"></div>
    <div class="form-group"><label>Email</label><input class="fc" id="suEmail" value="${sup?.Email||''}"></div>
    <div class="form-group"><label>Address</label><input class="fc" id="suAddr" value="${sup?.Address||''}"></div>
    <div class="form-group" style="grid-column:1/-1"><label>Notes</label><textarea class="fc" id="suNotes">${sup?.Notes||''}</textarea></div>
  </div></div><div class="modal-foot"><button class="btn btn-outline" onclick="closeModal('supModal')">Cancel</button><button class="btn btn-primary" onclick="saveSup('${sup?.ID||''}')"><i class="fas fa-save"></i>Save</button></div></div></div>`);
  openModal('supModal');
}

function editSup(id){const s=S.suppliers.find(x=>x.ID===id);if(s)openSupModal(s)}

async function saveSup(id){
  const data={ID:id,Name:document.getElementById('suName').value,Phone:document.getElementById('suPhone').value,Email:document.getElementById('suEmail').value,Address:document.getElementById('suAddr').value,Notes:document.getElementById('suNotes').value};
  if(!data.Name){toast('Name required','error');return}
  const r=await apiPost(id?'updateSupplier':'addSupplier',data);
  if(r.success){toast(id?'Supplier updated!':'Supplier added!');closeModal('supModal');renderPage('suppliers')}
}

async function delSup(id){if(!confirm('Delete supplier?'))return;const r=await apiPost('deleteSupplier',{ID:id});if(r.success){toast('Supplier deleted');renderPage('suppliers')}}

// ============================================================
// SUPPLIER LEDGER
// ============================================================
async function renderSupplierLedger(area){
  if(!S.suppliers.length)S.suppliers=await apiGet('getSuppliers');
  S.supplierLedger=await apiGet('getSupplierLedger');
  const c=C();
  area.innerHTML=`<div class="card"><div class="card-hdr"><div class="toolbar" style="width:100%">
    <select class="fc" style="width:auto" id="slSup" onchange="filterSLedger()"><option value="">All Suppliers</option>${S.suppliers.map(s=>`<option value="${s.ID}">${esc(s.Name)}</option>`).join('')}</select>
    <button class="btn btn-primary" onclick="openSLModal()"><i class="fas fa-plus"></i>Add Entry</button>
  </div></div><div class="card-body np"><div class="tbl-wrap" id="slTblL"></div></div></div>`;
  filterSLedger();
}

function filterSLedger(){
  const supId=document.getElementById('slSup')?.value||'';
  const data=supId?S.supplierLedger.filter(e=>String(e.SupplierID)===supId):S.supplierLedger;
  const c=C();
  document.getElementById('slTblL').innerHTML=data.length?`<table><thead><tr><th>Date</th><th>Supplier</th><th>Description</th><th>Debit</th><th>Credit</th><th>Balance</th></tr></thead><tbody>${data.map(e=>`<tr>
    <td>${fmtD(e.Date)}</td><td><strong>${esc(e.SupplierName)}</strong></td><td>${e.Description||'-'}</td>
    <td style="color:var(--danger)">${Number(e.Debit)?c+Number(e.Debit).toLocaleString():'-'}</td>
    <td style="color:var(--secondary)">${Number(e.Credit)?c+Number(e.Credit).toLocaleString():'-'}</td>
    <td><strong>${c}${Number(e.Balance).toLocaleString()}</strong></td>
  </tr>`).join('')}</tbody></table>`:'<div style="padding:30px;text-align:center;color:var(--text-muted)">No entries</div>';
}

function openSLModal(){
  let m=document.getElementById('slModal');if(m)m.remove();
  document.body.insertAdjacentHTML('beforeend',`<div class="modal-overlay" id="slModal"><div class="modal"><div class="modal-hdr"><h3>Add Supplier Ledger Entry</h3><button class="modal-close" onclick="closeModal('slModal')">&times;</button></div><div class="modal-body"><div class="fg">
    <div class="form-group"><label>Supplier *</label><select class="fc" id="sleSupp">${S.suppliers.map(s=>`<option value="${s.ID}" data-name="${esc(s.Name)}">${esc(s.Name)}</option>`).join('')}</select></div>
    <div class="form-group"><label>Description</label><input class="fc" id="sleDesc"></div>
    <div class="form-group"><label>Debit (Purchase)</label><input type="number" class="fc" id="sleDebit" value="0"></div>
    <div class="form-group"><label>Credit (Payment)</label><input type="number" class="fc" id="sleCredit" value="0"></div>
    <div class="form-group" style="grid-column:1/-1"><label>Notes</label><input class="fc" id="sleNotes"></div>
  </div></div><div class="modal-foot"><button class="btn btn-outline" onclick="closeModal('slModal')">Cancel</button><button class="btn btn-primary" onclick="saveSLE()"><i class="fas fa-save"></i>Save</button></div></div></div>`);
  openModal('slModal');
}

async function saveSLE(){
  const sel=document.getElementById('sleSupp');
  const r=await apiPost('addSupplierLedgerEntry',{SupplierID:sel.value,SupplierName:sel.selectedOptions[0]?.dataset.name||'',Description:document.getElementById('sleDesc').value,Debit:document.getElementById('sleDebit').value,Credit:document.getElementById('sleCredit').value,Notes:document.getElementById('sleNotes').value});
  if(r.success){toast('Ledger entry added!');closeModal('slModal');renderPage('supplierLedger')}
}

// ============================================================
// EXPENSES
// ============================================================
async function renderExpenses(area){
  S.expenses=await apiGet('getExpenses');
  const c=C();const total=S.expenses.reduce((s,e)=>s+(Number(e.Amount)||0),0);
  area.innerHTML=`<div class="card"><div class="card-hdr"><div class="toolbar" style="width:100%">
    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="eSrch" placeholder="Search expenses..." oninput="filterExp()"></div>
    <button class="btn btn-primary" onclick="openExpModal()"><i class="fas fa-plus"></i>Add Expense</button>
  </div></div><div class="card-body np"><div style="padding:14px 20px;background:var(--bg);border-bottom:1px solid var(--border)"><strong>Total: <span style="color:var(--danger)">${c}${total.toLocaleString()}</span></strong></div><div class="tbl-wrap" id="eTbl"></div></div></div>`;
  filterExp();
}

function filterExp(){
  const srch=(document.getElementById('eSrch')?.value||'').toLowerCase();
  const data=S.expenses.filter(e=>!srch||(e.Category||'').toLowerCase().includes(srch)||(e.Description||'').toLowerCase().includes(srch));
  const sorted=[...data].reverse();const c=C();
  document.getElementById('eTbl').innerHTML=sorted.length?`<table><thead><tr><th>Date</th><th>Category</th><th>Description</th><th>Amount</th><th>Paid To</th><th>Method</th><th></th></tr></thead><tbody>${sorted.map(e=>`<tr>
    <td>${fmtD(e.Date)}</td><td><span class="badge badge-p">${e.Category}</span></td><td>${e.Description||'-'}</td>
    <td><strong style="color:var(--danger)">${c}${Number(e.Amount).toLocaleString()}</strong></td><td>${e.PaidTo||'-'}</td><td>${e.PaymentMethod||'-'}</td>
    <td><button class="btn btn-danger btn-sm" onclick="delExp('${e.ID}')"><i class="fas fa-trash"></i></button></td>
  </tr>`).join('')}</tbody></table>`:'<div style="padding:30px;text-align:center;color:var(--text-muted)">No expenses</div>';
}

function openExpModal(){
  let m=document.getElementById('expModal');if(m)m.remove();
  const cats=['Rent','Transport','Packaging','Marketing','Salary','Utilities','Shipping','Stock Purchase','Other'];
  document.body.insertAdjacentHTML('beforeend',`<div class="modal-overlay" id="expModal"><div class="modal"><div class="modal-hdr"><h3>Add Expense</h3><button class="modal-close" onclick="closeModal('expModal')">&times;</button></div><div class="modal-body"><div class="fg">
    <div class="form-group"><label>Category</label><select class="fc" id="exCat">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div>
    <div class="form-group"><label>Amount *</label><input type="number" class="fc" id="exAmt"></div>
    <div class="form-group"><label>Description</label><input class="fc" id="exDesc"></div>
    <div class="form-group"><label>Paid To</label><input class="fc" id="exPaidTo"></div>
    <div class="form-group"><label>Method</label><select class="fc" id="exMethod">${makeOptions(PAY_METHODS)}</select></div>
    <div class="form-group"><label>Notes</label><input class="fc" id="exNotes"></div>
  </div></div><div class="modal-foot"><button class="btn btn-outline" onclick="closeModal('expModal')">Cancel</button><button class="btn btn-primary" onclick="saveExp()"><i class="fas fa-save"></i>Save</button></div></div></div>`);
  openModal('expModal');
}

async function saveExp(){
  const data={Category:document.getElementById('exCat').value,Amount:document.getElementById('exAmt').value,Description:document.getElementById('exDesc').value,PaidTo:document.getElementById('exPaidTo').value,PaymentMethod:document.getElementById('exMethod').value,Notes:document.getElementById('exNotes').value};
  if(!data.Amount||Number(data.Amount)<=0){toast('Enter valid amount','error');return}
  const r=await apiPost('addExpense',data);
  if(r.success){toast('Expense added!');closeModal('expModal');renderPage('expenses')}
}

async function delExp(id){if(!confirm('Delete expense?'))return;const r=await apiPost('deleteExpense',{ID:id});if(r.success){toast('Expense deleted');renderPage('expenses')}}

// ============================================================
// AFFILIATES
// ============================================================
async function renderAffiliates(area){
  S.affiliates=await apiGet('getAffiliates');
  const c=C();
  area.innerHTML=`<div class="card"><div class="card-hdr">
    <h3><i class="fas fa-link" style="color:var(--purple);margin-right:6px"></i>Affiliate Codes</h3>
    <button class="btn btn-primary" onclick="openAffModal()"><i class="fas fa-plus"></i>Add Code</button>
  </div><div class="card-body np"><div class="tbl-wrap">${S.affiliates.length?`<table><thead><tr><th>Code</th><th>Name</th><th>Discount</th><th>Times Used</th><th>Total Discount Given</th><th>Active</th><th>Actions</th></tr></thead><tbody>${S.affiliates.map(a=>{
    const discLabel=(a.DiscountType==='Fixed')?(c+Number(a.DiscountValue||0).toLocaleString()+' flat'):(Number(a.DiscountValue||a.DiscountPercent||0)+'%');
    return`<tr>
    <td><strong style="color:var(--purple)">${a.Code}</strong></td><td>${esc(a.Name||'-')}</td>
    <td><span class="badge badge-p">${discLabel}</span></td>
    <td>${a.TotalUsed||0}</td>
    <td>${c}${Number(a.TotalDiscountGiven||0).toLocaleString()}</td>
    <td>${a.Active==='Yes'?'<span class="badge badge-s">Active</span>':'<span class="badge badge-d">Inactive</span>'}</td>
    <td><div class="btn-group"><button class="btn btn-outline btn-sm" onclick="editAff('${a.ID}')"><i class="fas fa-pen"></i></button><button class="btn btn-danger btn-sm" onclick="delAff('${a.ID}')"><i class="fas fa-trash"></i></button></div></td>
  </tr>`}).join('')}</tbody></table>`:'<div style="padding:30px;text-align:center;color:var(--text-muted)">No affiliates</div>'}</div></div></div>`;
}

function openAffModal(aff=null){
  let m=document.getElementById('affModal');if(m)m.remove();
  const curType=aff?.DiscountType||'Percentage';
  document.body.insertAdjacentHTML('beforeend',`<div class="modal-overlay" id="affModal"><div class="modal" style="max-width:500px"><div class="modal-hdr"><h3>${aff?'Edit':'Add'} Affiliate</h3><button class="modal-close" onclick="closeModal('affModal')">&times;</button></div><div class="modal-body"><div class="fg">
    <div class="form-group"><label>Code *</label><input class="fc" id="afCode" value="${aff?.Code||''}"></div>
    <div class="form-group"><label>Name</label><input class="fc" id="afName" value="${aff?.Name||''}"></div>
    <div class="form-group"><label>Discount Type</label><select class="fc" id="afType"><option value="Percentage" ${curType==='Percentage'?'selected':''}>Percentage (%)</option><option value="Fixed" ${curType==='Fixed'?'selected':''}>Fixed Amount (${C()})</option></select></div>
    <div class="form-group"><label>Discount Value</label><input type="number" class="fc" id="afDisc" value="${aff?.DiscountValue||aff?.DiscountPercent||5}" placeholder="e.g. 10 for 10% or 50 for ৳50"></div>
    <div class="form-group"><label>Active</label><select class="fc" id="afActive"><option value="Yes" ${aff?.Active!=='No'?'selected':''}>Yes</option><option value="No" ${aff?.Active==='No'?'selected':''}>No</option></select></div>
  </div></div><div class="modal-foot"><button class="btn btn-outline" onclick="closeModal('affModal')">Cancel</button><button class="btn btn-primary" onclick="saveAff('${aff?.ID||''}')"><i class="fas fa-save"></i>Save</button></div></div></div>`);
  openModal('affModal');
}

function editAff(id){const a=S.affiliates.find(x=>x.ID===id);if(a)openAffModal(a)}

async function saveAff(id){
  const data={ID:id,Code:document.getElementById('afCode').value,Name:document.getElementById('afName').value,DiscountType:document.getElementById('afType').value,DiscountValue:document.getElementById('afDisc').value,Active:document.getElementById('afActive').value==='Yes'};
  if(!data.Code){toast('Code required','error');return}
  const r=await apiPost(id?'updateAffiliate':'addAffiliate',data);
  if(r.success){toast(id?'Affiliate updated!':'Affiliate added!');closeModal('affModal');renderPage('affiliates')}
}

async function delAff(id){if(!confirm('Delete affiliate?'))return;const r=await apiPost('deleteAffiliate',{ID:id});if(r.success){toast('Affiliate deleted');renderPage('affiliates')}}

// ============================================================
async function renderSettings(area){
  S.settings=await apiGet('getSettings');
  const s=S.settings;
  area.innerHTML=`<div class="card"><div class="card-hdr"><h3><i class="fas fa-gear" style="color:var(--text-muted);margin-right:6px"></i>Business Settings</h3></div><div class="card-body"><div class="fg">
    <div class="form-group"><label>Business Name</label><input class="fc" id="stBiz" value="${s.businessName||'Fan Field'}"></div>
    <div class="form-group"><label>Motto</label><input class="fc" id="stMotto" value="${s.motto||'Home of Authentic & Quality Jerseys'}"></div>
    <div class="form-group"><label>Currency Symbol</label><input class="fc" id="stCur" value="${s.currency||'৳'}"></div>
    <div class="form-group"><label>Invoice Prefix</label><input class="fc" id="stPfx" value="${s.invoicePrefix||'FF-'}"></div>
    <div class="form-group"><label>Next Invoice #</label><input type="number" class="fc" id="stNum" value="${s.nextInvoiceNum||1001}"></div>
    <div class="form-group"><label>Phone</label><input class="fc" id="stPhone" value="${s.phone||''}"></div>
    <div class="form-group"><label>Address</label><input class="fc" id="stAddr" value="${s.address||''}"></div>
    <div class="form-group"><label>Default Patch Price</label><input type="number" class="fc" id="stPatch" value="${s.patchDefaultPrice||50}"></div>
    <div class="form-group"><label>Default Name Print Price</label><input type="number" class="fc" id="stName" value="${s.namePrintDefaultPrice||100}"></div>
  </div><button class="btn btn-primary" onclick="saveSets()" style="margin-top:14px"><i class="fas fa-save"></i>Save Settings</button></div></div>`;
}

async function saveSets(){
  const settings={
    businessName:document.getElementById('stBiz').value,motto:document.getElementById('stMotto').value,
    currency:document.getElementById('stCur').value,invoicePrefix:document.getElementById('stPfx').value,
    nextInvoiceNum:document.getElementById('stNum').value,phone:document.getElementById('stPhone').value,
    address:document.getElementById('stAddr').value,patchDefaultPrice:document.getElementById('stPatch').value,
    namePrintDefaultPrice:document.getElementById('stName').value
  };
  const r=await apiPost('updateSettings',{settings});
  if(r.success){toast('Settings saved!');S.currency=settings.currency;S.settings=settings}
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fan Field — Inventory Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>


<style>
  .content > * {
  animation: pageIn .35s cubic-bezier(.4,0,.2,1);
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
:root{
  /* Color Palette */
  --primary:#3b82f6;--primary-dark:#2563eb;--primary-light:rgba(59,130,246,.15);
  --secondary:#10b981;--secondary-dark:#059669;--secondary-light:rgba(16,185,129,.15);
  --warning:#f59e0b;--warning-dark:#d97706;--warning-light:rgba(245,158,11,.15);
  --danger:#ef4444;--danger-dark:#dc2626;--danger-light:rgba(239,68,68,.15);
  --purple:#8b5cf6;--purple-dark:#7c3aed;--purple-light:rgba(139,92,246,.15);
  --pink:#ec4899;--pink-light:rgba(236,72,153,.15);
  
  /* Surfaces */
  --bg:#0a0e1a;--bg-2:#0d1321;--surface:#111827;--surface-2:#1a2236;--surface-hover:#1e293b;
  --border:#1e293b;--border-light:#2a3548;
  
  /* Text */
  --text:#f1f5f9;--text-sec:#cbd5e1;--text-muted:#64748b;--text-faint:#475569;
  
  /* Sidebar */
  --sidebar-bg:#050811;--sidebar-text:#94a3b8;--sidebar-active:#3b82f6;
  
  /* Layout */
  --radius:14px;--radius-sm:10px;--radius-xs:6px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  --shadow:0 4px 6px -1px rgba(0,0,0,.5),0 2px 4px -2px rgba(0,0,0,.3);
  --shadow-md:0 10px 15px -3px rgba(0,0,0,.5),0 4px 6px -4px rgba(0,0,0,.3);
  --shadow-lg:0 20px 25px -5px rgba(0,0,0,.6),0 8px 10px -6px rgba(0,0,0,.4);
  --shadow-glow:0 0 20px rgba(59,130,246,.15);
  
  --transition:all .25s cubic-bezier(.4,0,.2,1);
  --transition-fast:all .15s cubic-bezier(.4,0,.2,1);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
img{max-width:100%;height:auto;display:block}

/* Better focus indicators */
:focus-visible{outline:2px solid var(--primary);outline-offset:2px}

/* Performance */
.page{content-visibility:auto;contain-intrinsic-size:800px}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}

body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  overflow-x:hidden;
  font-feature-settings:"cv02","cv03","cv04","cv11";
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* App Layout */
.app{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{
  width:260px;background:var(--sidebar-bg);color:var(--sidebar-text);
  position:fixed;top:0;left:0;bottom:0;z-index:1000;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;display:flex;flex-direction:column;
  border-right:1px solid rgba(255,255,255,.04);
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}

.sidebar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 999;            /* below sidebar (1000), above content */
  opacity: 0;
  visibility: hidden;
  transition: opacity .25s ease;
}
.sidebar-overlay.active {
  opacity: 1;
  visibility: visible;
}

.sb-header{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.05)}
.sb-logo{display:flex;align-items:center;gap:12px}
.sb-logo img{box-shadow:0 4px 12px rgba(59,130,246,.3)}
.sb-logo h1{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.4px;line-height:1.2}
.sb-logo p{font-size:9.5px;color:var(--text-muted);margin-top:2px;letter-spacing:.3px}

.sb-nav{padding:14px 0;flex:1}
.nav-section{padding:0 12px;margin-bottom:6px}
.nav-title{
  font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;
  color:var(--text-faint);padding:10px 14px 8px;
}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:10px 14px;margin:1px 0;
  border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition-fast);
  font-size:13px;font-weight:500;color:var(--sidebar-text);user-select:none;
  position:relative;
}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff;transform:translateX(2px)}
.nav-item.active{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;box-shadow:0 4px 12px rgba(59,130,246,.35);
}
.nav-item.active::before{
  content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);
  width:3px;height:60%;background:#fff;border-radius:0 3px 3px 0;
}
.nav-item i{width:18px;text-align:center;font-size:13px;flex-shrink:0}
.nav-badge{
  margin-left:auto;background:var(--danger);color:#fff;font-size:10px;
  padding:2px 8px;border-radius:10px;font-weight:700;
  box-shadow:0 2px 6px rgba(239,68,68,.4);
}

/* Main Content */
.main{margin-left:260px;flex:1;min-height:100vh}

/* Topbar */
.topbar{
  background:rgba(17,24,39,.85);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:14px 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.topbar-left{display:flex;align-items:center;gap:14px}
.menu-toggle{
  display:none;background:none;border:none;font-size:20px;cursor:pointer;
  color:var(--text);padding:6px;border-radius:var(--radius-xs);
  transition:var(--transition-fast);
}
.menu-toggle:hover{background:var(--surface-hover)}
.page-title h2{font-size:18px;font-weight:700;letter-spacing:-.4px;line-height:1.2}
.page-title p{font-size:11px;color:var(--text-muted);margin-top:2px}

.topbar-right{display:flex;align-items:center;gap:10px}
.sync-status{
  font-size:11px;color:var(--text-muted);padding:4px 10px;
  background:var(--surface-2);border-radius:20px;font-weight:500;
}
.btn-icon{
  padding:8px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;
  display:flex;align-items:center;gap:6px;transition:var(--transition-fast);
  color:var(--text-sec);
}
.btn-icon:hover{
  border-color:var(--primary);color:var(--primary);
  background:var(--primary-light);transform:translateY(-1px);
}

.content{padding:28px;max-width:1600px;margin:0 auto}

/* Stats Grid */
.stats-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;margin-bottom:24px;
}
.stat-card{
  background:var(--surface);border-radius:var(--radius);padding:20px;
  border:1px solid var(--border);transition:var(--transition);
  position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--primary),var(--purple));
  opacity:0;transition:opacity .3s;
}
.stat-card:hover{
  box-shadow:var(--shadow-md);transform:translateY(-2px);
  border-color:var(--border-light);
}
.stat-card:hover::before{opacity:1}
.stat-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.stat-icon{
  width:44px;height:44px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:18px;
}
.stat-icon.blue{background:var(--primary-light);color:var(--primary)}
.stat-icon.green{background:var(--secondary-light);color:var(--secondary)}
.stat-icon.orange{background:var(--warning-light);color:var(--warning)}
.stat-icon.red{background:var(--danger-light);color:var(--danger)}
.stat-icon.purple{background:var(--purple-light);color:var(--purple)}
.stat-val{
  font-size:26px;font-weight:800;letter-spacing:-1.2px;margin-bottom:2px;
  font-feature-settings:"tnum";
}
.stat-label{font-size:11.5px;color:var(--text-muted);font-weight:500}

/* Cards */
.card{
  background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border);margin-bottom:22px;
  transition:var(--transition);overflow:hidden;
}
.card:hover{border-color:var(--border-light)}
.card-hdr{
  padding:18px 22px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;
}
.card-hdr h3{font-size:15px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center}
.card-body{padding:22px}
.card-body.np{padding:0}

/* Buttons */
.btn{
  padding:9px 18px;border-radius:var(--radius-sm);font-size:12.5px;
  font-weight:600;cursor:pointer;border:none;display:inline-flex;
  align-items:center;gap:6px;transition:var(--transition-fast);
  font-family:inherit;letter-spacing:.2px;white-space:nowrap;
  position:relative;overflow:hidden;
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed;pointer-events:none}

.btn-primary{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;
  box-shadow:0 2px 8px rgba(59,130,246,.3);
}
.btn-primary:hover{
  box-shadow:0 4px 14px rgba(59,130,246,.45);transform:translateY(-1px);
}

.btn-success{
  background:linear-gradient(135deg,var(--secondary),var(--secondary-dark));color:#fff;
  box-shadow:0 2px 8px rgba(16,185,129,.3);
}
.btn-success:hover{box-shadow:0 4px 14px rgba(16,185,129,.45);transform:translateY(-1px)}

.btn-warning{
  background:linear-gradient(135deg,var(--warning),var(--warning-dark));color:#fff;
  box-shadow:0 2px 8px rgba(245,158,11,.3);
}
.btn-warning:hover{box-shadow:0 4px 14px rgba(245,158,11,.45);transform:translateY(-1px)}

.btn-danger{
  background:linear-gradient(135deg,var(--danger),var(--danger-dark));color:#fff;
  box-shadow:0 2px 8px rgba(239,68,68,.3);
}
.btn-danger:hover{box-shadow:0 4px 14px rgba(239,68,68,.45);transform:translateY(-1px)}

.btn-outline{
  background:transparent;color:var(--text-sec);border:1px solid var(--border);
}
.btn-outline:hover{
  border-color:var(--primary);color:var(--primary);
  background:var(--primary-light);
}

.btn-sm{padding:6px 12px;font-size:11.5px}
.btn-lg{padding:12px 24px;font-size:13.5px}
.btn-group{display:flex;gap:6px;flex-wrap:wrap}

/* Tables */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl-wrap::-webkit-scrollbar{height:6px}
table{width:100%;border-collapse:collapse}
table th{
  background:var(--surface-2);padding:11px 14px;font-size:10.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);
  text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);
}
table th.sortable{cursor:pointer;user-select:none;transition:var(--transition-fast)}
table th.sortable:hover{color:var(--primary);background:var(--surface-hover)}
table td{
  padding:12px 14px;font-size:12.5px;border-bottom:1px solid var(--border);
  color:var(--text-sec);transition:var(--transition-fast);
}
table tbody tr{transition:var(--transition-fast)}
table tbody tr:hover{background:var(--surface-hover)}
table tbody tr:last-child td{border-bottom:none}

/* Badges */
.badge{
  padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:700;
  white-space:nowrap;letter-spacing:.2px;display:inline-flex;align-items:center;gap:4px;
}
.badge-s{background:var(--secondary-light);color:var(--secondary)}
.badge-w{background:var(--warning-light);color:var(--warning)}
.badge-d{background:var(--danger-light);color:var(--danger)}
.badge-i{background:var(--primary-light);color:var(--primary)}
.badge-p{background:var(--purple-light);color:var(--purple)}
.badge-cancelled{background:rgba(107,114,128,.2);color:#9ca3af;text-decoration:line-through}

/* Forms */
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.form-group{margin-bottom:14px}
.form-group label{
  display:block;font-size:11.5px;font-weight:600;color:var(--text-sec);
  margin-bottom:6px;letter-spacing:.2px;
}
.fc{
  width:100%;padding:10px 13px;border:1px solid var(--border);
  border-radius:var(--radius-sm);font-size:13px;font-family:inherit;
  transition:var(--transition-fast);background:var(--bg-2);color:var(--text);
}
.fc::placeholder{color:var(--text-faint)}
.fc option{background:var(--surface);color:var(--text)}
.fc:hover{border-color:var(--border-light)}
.fc:focus{
  outline:none;border-color:var(--primary);
  box-shadow:0 0 0 3px var(--primary-light);
  background:var(--surface);
}
select.fc{cursor:pointer;padding-right:32px}
textarea.fc{resize:vertical;min-height:70px;line-height:1.5}

/* Modals */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.75);backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:2000;display:none;align-items:center;justify-content:center;
  padding:16px;animation:fadeIn .2s;
}
.modal-overlay.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);border-radius:var(--radius);
  width:100%;max-width:700px;max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);border:1px solid var(--border);
  animation:scaleIn .25s cubic-bezier(.4,0,.2,1);
}
@keyframes scaleIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-hdr{
  padding:18px 22px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  position:sticky;top:0;background:var(--surface);z-index:1;
  border-radius:var(--radius) var(--radius) 0 0;
}
.modal-hdr h3{font-size:16px;font-weight:700;letter-spacing:-.2px;flex:1}
.modal-close{
  background:none;border:none;font-size:22px;cursor:pointer;
  color:var(--text-muted);padding:4px 10px;border-radius:var(--radius-xs);
  transition:var(--transition-fast);line-height:1;
}
.modal-close:hover{color:var(--danger);background:var(--danger-light)}
.modal-body{padding:22px}
.modal-foot{
  padding:14px 22px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;
  position:sticky;bottom:0;background:var(--surface);z-index:1;
  border-radius:0 0 var(--radius) var(--radius);
}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.search-box{position:relative;flex:1;min-width:160px}
.search-box input{
  width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);
  border-radius:var(--radius-sm);font-size:12.5px;font-family:inherit;
  background:var(--bg-2);color:var(--text);transition:var(--transition-fast);
}
.search-box input:focus{
  outline:none;border-color:var(--primary);
  box-shadow:0 0 0 3px var(--primary-light);background:var(--surface);
}
.search-box input::placeholder{color:var(--text-faint)}
.search-box i{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--text-muted);font-size:12px;pointer-events:none;
}

/* Stock bar */
.stock-bar-c{
  width:70px;height:6px;background:rgba(255,255,255,.08);
  border-radius:3px;overflow:hidden;display:inline-block;
  vertical-align:middle;margin-right:6px;
}
.stock-bar{height:100%;border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}

/* Charts */
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:200px;padding-top:16px}
.chart-bw{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.chart-bar{
  width:100%;max-width:48px;
  background:linear-gradient(180deg,var(--primary),var(--purple));
  border-radius:8px 8px 0 0;min-height:3px;
  transition:height .8s cubic-bezier(.4,0,.2,1);
  box-shadow:0 2px 8px rgba(59,130,246,.3);
}
.chart-bw:hover .chart-bar{box-shadow:0 4px 16px rgba(59,130,246,.5)}
.chart-bv{font-size:9.5px;font-weight:700;color:var(--text-sec);margin-bottom:4px}
.chart-bl{font-size:9.5px;color:var(--text-muted);margin-top:6px;font-weight:500}

/* Dashboard */
.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px}

/* Spinner & Loading */
.spinner{
  display:inline-block;width:18px;height:18px;
  border:2.5px solid var(--border);border-top-color:var(--primary);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{
  display:flex;align-items:center;justify-content:center;
  padding:50px;gap:12px;color:var(--text-muted);font-size:13px;
}

/* Toasts */
.toast-container{
  position:fixed;top:16px;right:16px;z-index:5000;
  display:flex;flex-direction:column;gap:8px;
}
.toast{
  padding:13px 20px;border-radius:var(--radius-sm);color:#fff;
  font-size:12.5px;font-weight:600;box-shadow:var(--shadow-lg);
  animation:slideIn .3s cubic-bezier(.4,0,.2,1);max-width:360px;
  display:flex;align-items:center;gap:10px;backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.toast i{font-size:16px}
.toast-success{background:linear-gradient(135deg,var(--secondary),var(--secondary-dark))}
.toast-error{background:linear-gradient(135deg,var(--danger),var(--danger-dark))}
.toast-warning{background:linear-gradient(135deg,var(--warning),var(--warning-dark))}
.toast-info{background:linear-gradient(135deg,var(--primary),var(--primary-dark))}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Empty States */
.empty-state{
  padding:60px 20px;text-align:center;color:var(--text-muted);
  display:flex;flex-direction:column;align-items:center;gap:14px;
}
.empty-state i{font-size:42px;color:var(--text-faint);opacity:.5}
.empty-state h4{font-size:14px;font-weight:600;color:var(--text-sec)}
.empty-state p{font-size:12px;max-width:300px}

/* Invoice Preview */
.inv-preview{
  border:1px solid var(--border);border-radius:var(--radius);
  padding:32px;background:#fff;color:#0f172a;
}
.inv-preview *{color:#0f172a}
.inv-preview .inv-table th{color:#fff!important}
.inv-hdr-row{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:28px;padding-bottom:20px;border-bottom:3px solid var(--primary);
}
.inv-brand{display:flex;align-items:center;gap:14px}
.inv-brand h2{font-size:26px;font-weight:900;color:var(--primary)}
.inv-brand .motto{font-size:11px;color:#64748b;font-style:italic;margin:2px 0 6px}
.inv-brand p{font-size:11px;color:#64748b;margin:1px 0}
.inv-meta{text-align:right}
.inv-meta h3{font-size:20px;margin-bottom:6px}
.inv-meta p{font-size:11px;color:#64748b;margin:2px 0}
.inv-parties{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:28px}
.inv-parties h4{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:6px}
.inv-parties p{font-size:12px;color:#475569;margin:1px 0}
.inv-parties .name{font-weight:700;font-size:14px;color:#0f172a}
.inv-table th{background:var(--primary);color:#fff;font-size:10.5px}
.inv-table td{font-size:12px}
.inv-totals{display:flex;justify-content:flex-end;margin-top:20px}
.inv-totals table{width:280px}
.inv-totals td{padding:6px 10px;font-size:12px}
.inv-totals tr:last-child td{font-weight:700;font-size:15px;border-top:2px solid #0f172a}
.inv-footer{margin-top:32px;padding-top:16px;border-top:1px solid #e2e8f0;text-align:center;font-size:10.5px;color:#64748b}
.inv-notes{margin-top:12px;padding:10px 14px;background:#f8fafc;border-radius:6px;font-size:11px;color:#475569;border:1px solid #e2e8f0}

/* Sales Items Table */
.si-tbl input,.si-tbl select{

async function apiGet(action,params={}){
  setSS('Syncing...');const url=new URL(API_URL);url.searchParams.set('action',action);
  for(const k in params)url.searchParams.set(k,params[k]);
  try{const r=await fetch(url.toString());const d=await r.json();if(d.error){toast(d.error,'error');setSS('Error');return d;}setSS('Synced ✓');return d;}
  catch(e){setSS('Offline');toast('Connection error','error');throw e;}
}
async function apiPost(action,payload){
  setSS('Saving...');
  try{const r=await fetch(API_URL,{method:'POST',body:JSON.stringify({action,...payload}),headers:{'Content-Type':'application/json'}});const d=await r.json();if(d.error){toast('Error: '+d.error,'error');setSS('Error');return d;}setSS('Saved ✓');return d;}

}
function setSS(t) {

  if (!el) return;
  el.textContent = t;
  
  // Color coding based on status
  el.style.color = '';

  } else if (t.includes('Error') || t.includes('Offline')) {
    el.style.color = 'var(--danger)';

  }
}

    warning: 'exclamation-triangle',
    info: 'info-circle'
  };
  t.innerHTML = `<i class="fas fa-${icons[type] || 'info-circle'}"></i><span>${msg}</span>`;

  // Click to dismiss

    t.style.animation = 'slideIn .3s reverse';

  });

    if (t.parentNode) {

}

// PHONE NUMBER FORMATTER (Bangladesh format: 017-1234-5678)
// ============================================================

// Format phone number as: 017-1234-5678
// Handles input variations: +880 1712345678, 8801712345678, 01712345678, 1712345678
function formatPhoneBD(phone) {
  if (!phone) return '';
  
  // Strip all non-numeric characters
  let digits = String(phone).replace(/\D/g, '');
  
  // Handle country code variations
  if (digits.startsWith('880')) digits = digits.substring(3);
  if (digits.startsWith('00880')) digits = digits.substring(5);
  
  // Add leading 0 if missing (e.g., 1712345678 → 01712345678)
  if (digits.length === 10 && !digits.startsWith('0')) {
    digits = '0' + digits;
  }
  
  // Limit to 11 digits (BD mobile format)
  digits = digits.substring(0, 11);
  
  // Format based on length
  if (digits.length <= 3) return digits;
  if (digits.length <= 7) return digits.substring(0, 3) + '-' + digits.substring(3);
  return digits.substring(0, 3) + '-' + digits.substring(3, 7) + '-' + digits.substring(7);
}

// Get only digits (for storage/comparison)
function unformatPhone(phone) {
  if (!phone) return '';
  let digits = String(phone).replace(/\D/g, '');
  if (digits.startsWith('880')) digits = digits.substring(3);
  if (digits.startsWith('00880')) digits = digits.substring(5);
  if (digits.length === 10 && !digits.startsWith('0')) digits = '0' + digits;
  return digits;
}

// Apply formatting to an input field as user types (preserves cursor position)
function applyPhoneFormatting(input) {
  if (!input) return;
  
  const oldValue = input.value;
  const oldCursor = input.selectionStart;
  
  // Count digits before cursor in old value
  const digitsBeforeCursor = oldValue.substring(0, oldCursor).replace(/\D/g, '').length;
  
  // Format the value
  const newValue = formatPhoneBD(oldValue);
  input.value = newValue;
  
  // Calculate new cursor position based on digit count
  let newCursor = 0;
  let digitCount = 0;
  for (let i = 0; i < newValue.length; i++) {
    if (digitCount >= digitsBeforeCursor) break;
    if (/\d/.test(newValue[i])) digitCount++;
    newCursor = i + 1;
  }
  
  // Restore cursor position
  setTimeout(() => {
    input.setSelectionRange(newCursor, newCursor);
  }, 0);
}

// Bind formatter to any input by ID
function bindPhoneFormatter(inputId) {
  const input = document.getElementById(inputId);
  if (!input) return;
  
  input.addEventListener('input', function() {
    applyPhoneFormatting(this);
  });
  
  // Format initial value if present
  if (input.value) {
    input.value = formatPhoneBD(input.value);
  }
}

function fmtD(d){if(!d)return'-';try{const dt=new Date(d);return isNaN(dt)?String(d).substring(0,10):dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}catch(e){return String(d).substring(0,10)}}
function statusBadge(s){return s==='Paid'?'<span class="badge badge-s">Paid</span>':s==='Partial'?'<span class="badge badge-w">Partial</span>':s==='Unpaid'?'<span class="badge badge-d">Unpaid</span>':'<span class="badge">'+s+'</span>'}
function deliveryBadge(s){if(!s||s===''||s==='None')return'-';const m={'Processing':'badge-w','Shipped':'badge-i','In Transit':'badge-p','Delivered':'badge-s','Returned':'badge-d'};return`<span class="badge ${m[s]||''}">` +esc(s)+'</span>'}
function makeOptions(arr,sel=''){return arr.map(a=>`<option value="${a}" ${a===sel?'selected':''}>${a}</option>`).join('')}
function C(){return S.currency||'৳'}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function buildPN(club,type,edition,size){return[club,type,edition,size].filter(Boolean).join(' ')}
function smartSort(data){return[...data].sort((a,b)=>{const cA=(a.Club_Country||'').toLowerCase(),cB=(b.Club_Country||'').toLowerCase();if(cA!==cB)return cA<cB?-1:1;const tA=TYPE_ORDER[a.Type]||99,tB=TYPE_ORDER[b.Type]||99;if(tA!==tB)return tA-tB;const eA=EDITION_ORDER[a.Edition]||99,eB=EDITION_ORDER[b.Edition]||99;if(eA!==eB)return eA-eB;const sA=SIZE_ORDER[a.Size]||99,sB=SIZE_ORDER[b.Size]||99;return sA-sB})}
function statCard(icon,color,val,label){return`<div class="stat-card"><div class="stat-hdr"><div class="stat-icon ${color}"><i class="fas ${icon}"></i></div></div><div class="stat-val">${val}</div><div class="stat-label">${label}</div></div>`}
function bookingStatusBadge(s){const colors={'Pending':'badge-w','Confirmed':'badge-i','Partial':'badge-p','Reserved':'badge-s','Backordered':'badge-d','Completed':'badge-s','Cancelled':'badge-cancelled'};return`<span class="badge ${colors[s]||'badge-i'}">${esc(s)}</span>`}

          <div style="font-size:18px;font-weight:800;color:var(--secondary)"><i class="fas fa-users"></i> ${S.customers.length}</div>
          <div style="font-size:10.5px;color:var(--text-muted);margin-top:3px">Customers</div>
        </div>
        <div onclick="nav('sales')" style="cursor:pointer;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;transition:all .2s" onmouseover="this.style.borderColor='var(--warning)';this.style.transform='translateY(-2px)'" onmouseout="this.style.borderColor='';this.style.transform=''">

async function performBigSearch(query) {
  if (!query.trim()) {
    document.getElementById('searchResults').innerHTML = '';
    return;
  }
  
  const q = query.toLowerCase();
  const results = {customers: [], products: [], sales: []};
  
  // Search customers
  (S.customers || []).forEach(c => {
    if ((c.Name||'').toLowerCase().includes(q) || (c.Phone||'').includes(q)) {
      results.customers.push(c);
    }
  });
  
  // Search products
  (S.inventory || []).forEach(p => {
    if ((p.ProductName||'').toLowerCase().includes(q) || (p.ID||'').toLowerCase().includes(q)) {
      results.products.push(p);
    }
  });
  
  // Search sales
  (S.sales || []).forEach(s => {
    if ((s.InvoiceNo||'').toLowerCase().includes(q) || (s.CustomerName||'').toLowerCase().includes(q)) {
      results.sales.push(s);
    }
  });
  
  let html = '<div style="display:grid;gap:14px">';
  
  if (results.customers.length) {
    html += '<div><h4 style="font-size:12px;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Customers</h4>';
    results.customers.slice(0,5).forEach(c => {
      html += `<div style="padding:10px;background:var(--surface);border-radius:8px;cursor:pointer;transition:all .2s" onclick="nav('customers')" onmouseover="this.style.borderLeft='3px solid var(--secondary)'" onmouseout="this.style.borderLeft=''"><strong>${esc(c.Name)}</strong><br><small style="color:var(--text-muted)">${esc(c.Phone||'-')}</small></div>`;
    });
    html += '</div>';
  }
  
  if (results.products.length) {
    html += '<div><h4 style="font-size:12px;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Products</h4>';
    results.products.slice(0,5).forEach(p => {
      html += `<div style="padding:10px;background:var(--surface);border-radius:8px;cursor:pointer;transition:all .2s" onmouseover="this.style.borderLeft='3px solid var(--primary)'" onmouseout="this.style.borderLeft=''"><strong>${esc(p.ProductName)}</strong><br><small style="color:var(--text-muted)">${esc(p.ID)} • Stock: ${p.Stock}</small></div>`;
    });
    html += '</div>';
  }
  
  if (results.sales.length) {
    html += '<div><h4 style="font-size:12px;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Sales</h4>';
    results.sales.slice(0,5).forEach(s => {
      html += `<div style="padding:10px;background:var(--surface);border-radius:8px;cursor:pointer;transition:all .2s" onmouseover="this.style.borderLeft='3px solid var(--warning)'" onmouseout="this.style.borderLeft=''"><strong>${esc(s.InvoiceNo)}</strong><br><small style="color:var(--text-muted)">${esc(s.CustomerName)} • ${fmtD(s.SaleDate)}</small></div>`;
    });
    html += '</div>';
  }
  
  if (!results.customers.length && !results.products.length && !results.sales.length) {
    html += '<div style="text-align:center;padding:20px;color:var(--text-muted)"><i class="fas fa-search" style="font-size:24px;opacity:.5;margin-bottom:10px;display:block"></i>No results found</div>';
  }
  
  html += '</div>';
  document.getElementById('searchResults').innerHTML = html;
}

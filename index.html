<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fan Field — Inventory Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
:root{
--primary:#3b82f6;--primary-dark:#2563eb;--primary-light:rgba(59,130,246,.15);
--secondary:#10b981;--secondary-light:rgba(16,185,129,.15);
--warning:#f59e0b;--warning-light:rgba(245,158,11,.15);
--danger:#ef4444;--danger-light:rgba(239,68,68,.15);
--purple:#8b5cf6;--purple-light:rgba(139,92,246,.15);
--bg:#0b0f19;--surface:#111827;--surface-hover:#1a2236;
--border:#1e293b;--text:#e2e8f0;--text-sec:#94a3b8;--text-muted:#64748b;
--sidebar-bg:#060a13;--sidebar-text:#94a3b8;
--radius:12px;--radius-sm:8px;
--shadow:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 6px -1px rgba(0,0,0,.4);--shadow-lg:0 10px 15px -3px rgba(0,0,0,.5);
--transition:all .2s ease;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
.app{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--sidebar-bg);color:var(--sidebar-text);position:fixed;top:0;left:0;bottom:0;z-index:1000;transition:transform .3s;overflow-y:auto;display:flex;flex-direction:column}
.sb-header{padding:22px 18px;border-bottom:1px solid rgba(255,255,255,.05)}
.sb-logo{display:flex;align-items:center;gap:12px}
.sb-logo h1{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.3px}
.sb-logo p{font-size:10px;color:var(--text-muted);margin-top:1px}
.sb-nav{padding:12px 0;flex:1}
.nav-section{padding:0 14px;margin-bottom:4px}
.nav-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:8px 12px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;margin:2px 0;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);font-size:13px;font-weight:500;color:var(--sidebar-text);user-select:none}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--primary);color:#fff}
.nav-item i{width:18px;text-align:center;font-size:13px}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.main{margin-left:260px;flex:1;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:14px}
.menu-toggle{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text);padding:4px}
.page-title h2{font-size:18px;font-weight:700;letter-spacing:-.3px}
.page-title p{font-size:11px;color:var(--text-muted)}
.topbar-right{display:flex;align-items:center;gap:10px}
.sync-status{font-size:11px;color:var(--text-muted)}
.btn-icon{padding:8px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;transition:var(--transition);color:var(--text-sec)}
.btn-icon:hover{border-color:var(--primary);color:var(--primary)}
.content{padding:28px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:20px;border:1px solid var(--border);transition:var(--transition)}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.stat-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stat-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
.stat-icon.blue{background:var(--primary-light);color:var(--primary)}
.stat-icon.green{background:var(--secondary-light);color:var(--secondary)}
.stat-icon.orange{background:var(--warning-light);color:var(--warning)}
.stat-icon.red{background:var(--danger-light);color:var(--danger)}
.stat-icon.purple{background:var(--purple-light);color:var(--purple)}
.stat-val{font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:2px}
.stat-label{font-size:12px;color:var(--text-muted);font-weight:500}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:22px}
.card-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.card-hdr h3{font-size:15px;font-weight:700}
.card-body{padding:22px}
.card-body.np{padding:0}
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:var(--transition);font-family:inherit}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--secondary);color:#fff}.btn-success:hover{background:#047857}
.btn-warning{background:var(--warning);color:#fff}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-outline{background:transparent;color:var(--text-sec);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);background:rgba(59,130,246,.08)}
.btn-sm{padding:5px 10px;font-size:11.5px}
.btn-lg{padding:11px 22px;font-size:13.5px}
.btn-group{display:flex;gap:6px;flex-wrap:wrap}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse}
table th{background:#151d2e;padding:10px 14px;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);text-align:left;white-space:nowrap}
table th.sortable{cursor:pointer;user-select:none}table th.sortable:hover{color:var(--primary)}
table td{padding:10px 14px;font-size:12.5px;border-bottom:1px solid var(--border);color:var(--text-sec)}
table tbody tr:hover{background:var(--surface-hover)}
.badge{padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.badge-s{background:var(--secondary-light);color:var(--secondary)}
.badge-w{background:var(--warning-light);color:var(--warning)}
.badge-d{background:var(--danger-light);color:var(--danger)}
.badge-i{background:var(--primary-light);color:var(--primary)}
.badge-p{background:var(--purple-light);color:var(--purple)}
.badge-cancelled{background:rgba(107,114,128,.2);color:#9ca3af;text-decoration:line-through}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11.5px;font-weight:600;color:var(--text-sec);margin-bottom:5px}
.fc{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12.5px;font-family:inherit;transition:var(--transition);background:#0d1321;color:var(--text)}
.fc option{background:#111827;color:var(--text)}
.fc:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
select.fc{cursor:pointer}textarea.fc{resize:vertical;min-height:70px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:2000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
.modal-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);padding:4px}
.modal-close:hover{color:var(--danger)}
.modal-body{padding:22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.search-box{position:relative;flex:1;min-width:140px}
.search-box input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12.5px;font-family:inherit;background:#0d1321;color:var(--text)}
.search-box input:focus{outline:none;border-color:var(--primary)}
.search-box input::placeholder{color:var(--text-muted)}
.search-box i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:12px}
.stock-bar-c{width:70px;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:5px}
.stock-bar{height:100%;border-radius:3px;transition:width .3s}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:180px;padding-top:16px}
.chart-bw{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.chart-bar{width:100%;max-width:44px;background:linear-gradient(135deg,var(--primary),#8b5cf6);border-radius:6px 6px 0 0;min-height:3px;transition:height .5s}
.chart-bv{font-size:9.5px;font-weight:600;color:var(--text-sec);margin-bottom:3px}
.chart-bl{font-size:9.5px;color:var(--text-muted);margin-top:6px;font-weight:500}
.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:22px;margin-bottom:22px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;padding:50px;gap:10px;color:var(--text-muted);font-size:13px}
.toast-container{position:fixed;top:16px;right:16px;z-index:5000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:var(--radius-sm);color:#fff;font-size:12.5px;font-weight:500;box-shadow:var(--shadow-lg);animation:slideIn .3s;max-width:340px;display:flex;align-items:center;gap:8px}
.toast-success{background:var(--secondary)}.toast-error{background:var(--danger)}.toast-warning{background:var(--warning)}.toast-info{background:var(--primary)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.inv-preview{border:1px solid var(--border);border-radius:var(--radius);padding:28px;background:#fff;color:#0f172a}
.inv-preview *{color:#0f172a}
.inv-preview .inv-table th{color:#fff!important}
.inv-hdr-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:20px;border-bottom:3px solid var(--primary)}
.inv-brand{display:flex;align-items:center;gap:14px}
.inv-brand h2{font-size:26px;font-weight:900;color:var(--primary)}
.inv-brand .motto{font-size:11px;color:#64748b;font-style:italic;margin:2px 0 6px}
.inv-brand p{font-size:11px;color:#64748b;margin:1px 0}
.inv-meta{text-align:right}
.inv-meta h3{font-size:20px;margin-bottom:6px}
.inv-meta p{font-size:11px;color:#64748b;margin:2px 0}
.inv-parties{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:28px}
.inv-parties h4{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:6px}
.inv-parties p{font-size:12px;color:#475569;margin:1px 0}
.inv-parties .name{font-weight:700;font-size:14px;color:#0f172a}
.inv-table th{background:var(--primary);color:#fff;font-size:10.5px}
.inv-table td{font-size:12px}
.inv-totals{display:flex;justify-content:flex-end;margin-top:20px}
.inv-totals table{width:280px}
.inv-totals td{padding:6px 10px;font-size:12px}
.inv-totals tr:last-child td{font-weight:700;font-size:15px;border-top:2px solid #0f172a}
.inv-footer{margin-top:32px;padding-top:16px;border-top:1px solid #e2e8f0;text-align:center;font-size:10.5px;color:#64748b}
.inv-notes{margin-top:12px;padding:10px 14px;background:#f8fafc;border-radius:6px;font-size:11px;color:#475569;border:1px solid #e2e8f0}
.si-tbl input,.si-tbl select{padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:11.5px;font-family:inherit;width:100%;background:#0d1321;color:var(--text)}
.si-tbl input:focus,.si-tbl select:focus{outline:none;border-color:var(--primary)}
.si-tbl .cb{width:auto;margin:0}
::selection{background:rgba(59,130,246,.3);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#2a3548;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3a4a60}
.hide-mobile{display:inline}
/* Summary text for copy */
.summary-text{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-size:12px;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto;color:var(--text)}
@media(max-width:1024px){.dash-grid{grid-template-columns:1fr}}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .menu-toggle{display:block}
  .content{padding:14px}
  .topbar{padding:10px 14px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .fg{grid-template-columns:1fr}
  .modal{max-width:100%;margin:8px}
  .hide-mobile{display:none}
  .toolbar{gap:6px}
  .toolbar select.fc{min-width:70px!important;font-size:11px;padding:7px 6px}
  .inv-hdr-row{flex-direction:column;gap:14px}
  .inv-meta{text-align:left}
  .inv-parties{grid-template-columns:1fr;gap:14px}
  .card-hdr{padding:14px 16px}
  .card-body{padding:16px}
  table th,table td{padding:8px 10px;font-size:11px}
  .stat-val{font-size:20px}
  .stat-card{padding:14px}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr}
  .toolbar{flex-direction:column;align-items:stretch}
  .toolbar .search-box{min-width:100%}
  .btn-group{flex-wrap:wrap}
}
@media print{
  .sidebar,.topbar,.no-print{display:none!important}
  .main{margin-left:0}
  .content{padding:0}
  .card{border:none;box-shadow:none}
  .inv-preview{border:none;padding:0;background:#fff!important;color:#000!important}
  .inv-preview *{color:#000!important}
  .inv-preview .inv-table th{background:#2563eb!important;color:#fff!important}
}
</style>
</head>

<div class="app">

</div>

const TYPE_ORDER={'Home':1,'Away':2,'Third':3,'Retro':4,'GK':5,'Training':6,'Terrance':7};
const EDITION_ORDER={'Player Edition':1,'Fan Edition':2,'Special Edition':3,'BD Premium':4};

let S={inventory:[],customers:[],sales:[],payments:[],suppliers:[],supplierLedger:[],expenses:[],affiliates:[],vouchers:[],deliveries:[],commissions:[],settings:{},dashboard:null,currency:'৳'};
let currentPage='dashboard';
let invSortCol='default',invSortDir='asc';

// API
async function apiGet(action,params={}){
  setSS('Syncing...');const url=new URL(API_URL);url.searchParams.set('action',action);
  for(const k in params)url.searchParams.set(k,params[k]);
  try{const r=await fetch(url.toString());const d=await r.json();if(d.error){toast(d.error,'error');setSS('Error');return d;}setSS('Synced ✓');return d;}
  catch(e){setSS('Offline');toast('Connection error','error');throw e;}
}
async function apiPost(action,payload){
  setSS('Saving...');
  try{const r=await fetch(API_URL,{method:'POST',body:JSON.stringify({action,...payload}),headers:{'Content-Type':'text/plain'}});const d=await r.json();if(d.error){toast('Error: '+d.error,'error');setSS('Error');return d;}setSS('Saved ✓');return d;}
  catch(e){setSS('Offline');toast('Connection error','error');throw e;}
}
function setSS(t){document.getElementById('syncSt').textContent=t}
function toast(msg,type='success'){const c=document.getElementById('toastBox');const t=document.createElement('div');t.className='toast toast-'+type;const icons={success:'check-circle',error:'exclamation-circle',warning:'exclamation-triangle',info:'info-circle'};t.innerHTML=`<i class="fas fa-${icons[type]||'info-circle'}"></i>${msg}`;c.appendChild(t);setTimeout(()=>t.remove(),4500)}
function openModal(id){document.getElementById(id).classList.add('active')}
function closeModal(id){document.getElementById(id).classList.remove('active')}

// NAV
const pgInfo={dashboard:['Dashboard','Overview of your business'],inventory:['Inventory','Manage products & stock'],pos:['New Sale / POS','Create sale & generate invoice'],sales:['Sales Ledger','All sales transactions'],delivery:['Delivery Management','Track shipments & deliveries'],profits:['Sales Profits','Profit tracking & margins'],customers:['Customers','Customer database'],payments:['Pending Payments','Track & receive payments'],suppliers:['Suppliers','Manage suppliers'],supplierLedger:['Supplier Ledger','Supplier transactions'],expenses:['Expenses','Business expenses'],affiliates:['Affiliates','Affiliate codes, commissions & payouts'],vouchers:['Vouchers','Voucher/coupon management'],settings:['Settings','Business configuration']};
function nav(page){currentPage=page;document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.querySelector(`.nav-item[data-page="${page}"]`)?.classList.add('active');const[t,s]=pgInfo[page]||[page,''];document.getElementById('pgTitle').textContent=t;document.getElementById('pgSub').textContent=s;document.getElementById('sidebar').classList.remove('open');renderPage(page)}
document.querySelectorAll('.nav-item').forEach(n=>n.addEventListener('click',()=>nav(n.dataset.page)));
function refreshPage(){renderPage(currentPage)}

async function renderPage(page){
  const area=document.getElementById('contentArea');
  area.innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>';
  try{switch(page){
    case'dashboard':await renderDashboard(area);break;case'inventory':await renderInventory(area);break;case'pos':await renderPOS(area);break;case'sales':await renderSales(area);break;case'delivery':await renderDelivery(area);break;case'profits':await renderProfits(area);break;case'customers':await renderCustomers(area);break;case'payments':await renderPayments(area);break;case'suppliers':await renderSuppliers(area);break;case'supplierLedger':await renderSupplierLedger(area);break;case'expenses':await renderExpenses(area);break;case'affiliates':await renderAffiliates(area);break;case'vouchers':await renderVouchers(area);break;case'settings':await renderSettings(area);break;
  }}catch(e){area.innerHTML=`<div class="loading" style="color:var(--danger)"><i class="fas fa-exclamation-circle"></i>Failed to load. Check API & try again.</div>`}
}

// HELPERS
function fmtD(d){if(!d)return'-';try{const dt=new Date(d);return isNaN(dt)?String(d).substring(0,10):dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}catch(e){return String(d).substring(0,10)}}
function statusBadge(s){return s==='Paid'?'<span class="badge badge-s">Paid</span>':s==='Partial'?'<span class="badge badge-w">Partial</span>':s==='Unpaid'?'<span class="badge badge-d">Unpaid</span>':s==='Cancelled'?'<span class="badge badge-cancelled">Cancelled</span>':`<span class="badge badge-i">${s||'-'}</span>`}
function deliveryBadge(s){if(!s||s===''||s==='None')return'-';const m={'Processing':'badge-w','Shipped':'badge-i','In Transit':'badge-p','Delivered':'badge-s','Returned':'badge-d'};return`<span class="badge ${m[s]||'badge-i'}">${s}</span>`}
function makeOptions(arr,sel=''){return arr.map(a=>`<option value="${a}" ${a===sel?'selected':''}>${a}</option>`).join('')}
function C(){return S.currency||'৳'}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function buildPN(club,type,edition,size){return[club,type,edition,size].filter(Boolean).join(' ')}
function smartSort(data){return[...data].sort((a,b)=>{const cA=(a.Club_Country||'').toLowerCase(),cB=(b.Club_Country||'').toLowerCase();if(cA!==cB)return cA<cB?-1:1;const tA=TYPE_ORDER[a.Type]||99,tB=TYPE_ORDER[b.Type]||99;if(tA!==tB)return tA-tB;const eA=EDITION_ORDER[a.Edition]||99,eB=EDITION_ORDER[b.Edition]||99;if(eA!==eB)return eA-eB;return(SIZE_ORDER[a.Size]||99)-(SIZE_ORDER[b.Size]||99)})}
function statCard(icon,color,val,label){return`<div class="stat-card"><div class="stat-hdr"><div class="stat-icon ${color}"><i class="fas ${icon}"></i></div></div><div class="stat-val">${val}</div><div class="stat-label">${label}</div></div>`}

  const d=await apiGet('getDashboard');S.dashboard=d;const c=C();
  const pendCount=(d.recentSales||[]).filter(s=>Number(s.DueAmount)>0).length;
  const badge=document.getElementById('pendBadge');
  if(pendCount>0){badge.style.display='';badge.textContent=pendCount}else{badge.style.display='none'}
  area.innerHTML=`
  <div class="stats-grid">
    ${statCard('fa-chart-line','blue',c+(d.todaySales||0).toLocaleString(),`Today's Sales (${d.todaySaleCount||0})`)}
    ${statCard('fa-calendar','green',c+(d.monthlySales||0).toLocaleString(),`Monthly Sales (${d.monthlySaleCount||0})`)}
    ${statCard('fa-coins','purple',c+(d.totalRevenue||0).toLocaleString(),'Total Revenue')}
    ${statCard('fa-clock','orange',c+(d.totalPending||0).toLocaleString(),'Pending Payments')}
    ${statCard('fa-arrow-trend-up','green',c+(d.todayProfit||0).toLocaleString(),'Today Profit')}
    ${statCard('fa-chart-area','green',c+(d.monthlyProfit||0).toLocaleString(),'Monthly Profit')}
    ${statCard('fa-hand-holding-dollar','purple',c+(d.totalProfit||0).toLocaleString(),'Total Profit')}
    ${statCard('fa-boxes-stacked','blue',String(d.totalProducts||0),`Products (${d.totalItems||0} items)`)}
    ${statCard('fa-triangle-exclamation','red',String(d.lowStockCount||0),`Low Stock (${d.outOfStockCount||0} out)`)}
    ${statCard('fa-shirt','green',String(d.totalUnitsSold||0),'Units Sold')}
    ${statCard('fa-boxes-packing','orange',c+(d.totalStockValue||0).toLocaleString(),'Inventory Value')}
    ${statCard('fa-wallet','orange',c+(d.totalExpenses||0).toLocaleString(),'Total Expenses')}
    ${statCard('fa-users','purple',String(d.totalCustomers||0),'Customers')}
  </div>
  <div class="dash-grid">
    <div class="card"><div class="card-hdr"><h3><i class="fas fa-chart-bar" style="color:var(--primary);margin-right:6px"></i>Monthly Sales</h3></div><div class="card-body"><div class="chart-bars" id="dChart"></div></div></div>
    <div class="card"><div class="card-hdr"><h3><i class="fas fa-triangle-exclamation" style="color:var(--warning);margin-right:6px"></i>Stock Alerts</h3></div><div class="card-body np"><div class="tbl-wrap" id="dAlerts"></div></div></div>
  </div>
  <div class="dash-grid">
    <div class="card"><div class="card-hdr"><h3><i class="fas fa-clock-rotate-left" style="color:var(--purple);margin-right:6px"></i>Recent Sales</h3></div><div class="card-body np"><div class="tbl-wrap" id="dRecent"></div></div></div>
    <div class="card"><div class="card-hdr"><h3><i class="fas fa-cubes" style="color:var(--secondary);margin-right:6px"></i>Recent Stock Updates</h3></div><div class="card-body np"><div class="tbl-wrap" id="dStockLog"></div></div></div>
  </div>`;
  // Chart
  const chart=document.getElementById('dChart');const cd=d.monthlySalesChart||[];
  if(cd.length){const mx=Math.max(...cd.map(x=>x.sales),1);chart.innerHTML=cd.map(x=>{const p=Math.max(2,(x.sales/mx)*100);return`<div class="chart-bw"><div class="chart-bv">${c}${x.sales>=1000?(x.sales/1000).toFixed(1)+'k':x.sales}</div><div class="chart-bar" style="height:${p}%"></div><div class="chart-bl">${x.month}</div></div>`}).join('')}
  // Alerts
  const alerts=[...(d.outOfStockItems||[]).map(i=>({...i,_t:'out'})),...(d.lowStockItems||[]).map(i=>({...i,_t:'low'}))];
  document.getElementById('dAlerts').innerHTML=alerts.length?`<table><thead><tr><th>Product</th><th>Stock</th><th>Status</th></tr></thead><tbody>${alerts.slice(0,12).map(i=>`<tr><td><strong>${esc(i.ProductName)}</strong></td><td>${i.Stock}</td><td>${i._t==='out'?'<span class="badge badge-d">Out</span>':'<span class="badge badge-w">Low</span>'}</td></tr>`).join('')}</tbody></table>`:'<div style="padding:30px;text-align:center;color:var(--secondary)"><i class="fas fa-check-circle"></i> All stock healthy!</div>';
  // Recent sales
  document.getElementById('dRecent').innerHTML=(d.recentSales||[]).length?`<table><thead><tr><th>Invoice</th><th>Customer</th><th>Amount</th><th>Status</th><th></th></tr></thead><tbody>${(d.recentSales||[]).map(s=>`<tr><td><strong>${s.InvoiceNo}</strong><br><small style="color:var(--text-muted)">${fmtD(s.Date)}</small></td><td>${esc(s.CustomerName||'Walk-in')}</td><td><strong>${c}${Number(s.FinalAmount).toLocaleString()}</strong></td><td>${statusBadge(s.Status)}</td><td><button class="btn btn-outline btn-sm" onclick="viewInvoice('${s.InvoiceNo}')"><i class="fas fa-file-invoice"></i></button></td></tr>`).join('')}</tbody></table>`:'<div style="padding:30px;text-align:center;color:var(--text-muted)">No sales yet</div>';
  // Stock log
  const slog=d.recentStockUpdates||[];
  document.getElementById('dStockLog').innerHTML=slog.length?`<table><thead><tr><th>Date</th><th>Product</th><th>Action</th><th>Change</th></tr></thead><tbody>${slog.map(l=>`<tr><td><small>${fmtD(l.Date)}</small></td><td>${esc(l.ProductName||l.ProductID)}</td><td><span class="badge badge-i">${l.Action}</span></td><td>${l.OldStock}→<strong>${l.NewStock}</strong></td></tr>`).join('')}</tbody></table>`:'<div style="padding:30px;text-align:center;color:var(--text-muted)">No stock updates</div>';
}

// ============================================================
// INVENTORY (with filters & sorting)
// ============================================================
async function renderInventory(area){
  S.inventory=await apiGet('getInventory');S.suppliers=await apiGet('getSuppliers');
  const cats=[...new Set(S.inventory.map(i=>i.Club_Country).filter(Boolean))].sort();
  const eds=[...new Set(S.inventory.map(i=>i.Edition).filter(Boolean))];
  const types=[...new Set(S.inventory.map(i=>i.Type).filter(Boolean))];
  const sizes=[...new Set(S.inventory.map(i=>i.Size).filter(Boolean))];
  invSortCol='default';invSortDir='asc';
  area.innerHTML=`<div class="card"><div class="card-hdr"><div class="toolbar" style="width:100%">
    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="invSrch" placeholder="Search..." oninput="filterInv()"></div>
    <select class="fc" style="width:auto;min-width:100px" id="invCat" onchange="filterInv()"><option value="">All Clubs</option>${cats.map(c=>`<option>${c}</option>`).join('')}</select>
    <select class="fc" style="width:auto;min-width:90px" id="invEd" onchange="filterInv()"><option value="">All Editions</option>${eds.map(e=>`<option>${e}</option>`).join('')}</select>
    <select class="fc" style="width:auto;min-width:80px" id="invType" onchange="filterInv()"><option value="">All Types</option>${types.map(t=>`<option>${t}</option>`).join('')}</select>
    <select class="fc" style="width:auto;min-width:70px" id="invSize" onchange="filterInv()"><option value="">Size</option>${sizes.map(s=>`<option>${s}</option>`).join('')}</select>
    <select class="fc" style="width:auto;min-width:80px" id="invStock" onchange="filterInv()"><option value="">Stock</option><option value="low">Low</option><option value="out">Out</option><option value="ok">OK</option></select>
    <button class="btn btn-outline btn-sm" onclick="setInvSort('smart')" title="Smart Group Sort"><i class="fas fa-layer-group"></i><span class="hide-mobile"> Group</span></button>
    <button class="btn btn-success btn-sm" onclick="openAddBatchModal()"><i class="fas fa-layer-group"></i><span class="hide-mobile"> Batch</span></button>
    <button class="btn btn-primary btn-sm" onclick="openProductModal()"><i class="fas fa-plus"></i><span class="hide-mobile"> Add</span></button>
  </div></div><div class="card-body np"><div class="tbl-wrap" id="invTbl"></div></div></div>`;
  filterInv();
}
function filterInv(){
  const srch=(document.getElementById('invSrch')?.value||'').toLowerCase();
  const cat=document.getElementById('invCat')?.value||'';
  const ed=document.getElementById('invEd')?.value||'';
  const type=document.getElementById('invType')?.value||'';
  const size=document.getElementById('invSize')?.value||'';
  const stk=document.getElementById('invStock')?.value||'';
  let data=S.inventory.filter(i=>{
    const ms=!srch||(i.ProductName||'').toLowerCase().includes(srch)||(i.Club_Country||'').toLowerCase().includes(srch)||(i.ID||'').toLowerCase().includes(srch);
    const mc=!cat||i.Club_Country===cat;const me=!ed||i.Edition===ed;const mt=!type||i.Type===type;const mz=!size||i.Size===size;
    let mst=true;if(stk==='low')mst=Number(i.Stock)>0&&Number(i.Stock)<=Number(i.MinStock||5);else if(stk==='out')mst=Number(i.Stock)===0;else if(stk==='ok')mst=Number(i.Stock)>Number(i.MinStock||5);
    return ms&&mc&&me&&mt&&mz&&mst;
  });
  // Default = alphabetical by Product Name; user can click headers for other sorts
if (invSortCol === 'default') {
  data = [...data].sort((a, b) => String(a.ProductName || '').localeCompare(String(b.ProductName || '')));
} else if (invSortCol === 'smart') {
  data = smartSort(data);
} else {
  data = colSort(data, invSortCol, invSortDir);
}
  renderInvTable(data);
}
function colSort(data,col,dir){return[...data].sort((a,b)=>{let vA,vB;switch(col){case'Edition':vA=EDITION_ORDER[a.Edition]||99;vB=EDITION_ORDER[b.Edition]||99;return dir==='asc'?vA-vB:vB-vA;case'Type':vA=TYPE_ORDER[a.Type]||99;vB=TYPE_ORDER[b.Type]||99;return dir==='asc'?vA-vB:vB-vA;case'Size':vA=SIZE_ORDER[a.Size]||99;vB=SIZE_ORDER[b.Size]||99;return dir==='asc'?vA-vB:vB-vA;case'CostPrice':case'SellPrice':case'Stock':vA=Number(a[col])||0;vB=Number(b[col])||0;return dir==='asc'?vA-vB:vB-vA;default:vA=String(a[col]||'').toLowerCase();vB=String(b[col]||'').toLowerCase();return dir==='asc'?vA.localeCompare(vB):-vA.localeCompare(vB)}})}
function setInvSort(mode) {
  invSortCol = mode;
  invSortDir = 'asc';
  filterInv();
}
function toggleInvSort(col){if(invSortCol===col){invSortDir=invSortDir==='asc'?'desc':'asc';if(invSortDir==='asc'&&invSortCol===col){invSortCol='default'}}else{invSortCol=col;invSortDir='asc'}filterInv()}
function si(col){if(invSortCol!==col)return'<i class="fas fa-sort" style="opacity:.3;margin-left:3px"></i>';return invSortDir==='asc'?'<i class="fas fa-sort-up" style="color:var(--primary);margin-left:3px"></i>':'<i class="fas fa-sort-down" style="color:var(--primary);margin-left:3px"></i>'}
function renderInvTable(data){
  const el=document.getElementById('invTbl');const c=C();
  if(!data.length){el.innerHTML='<div style="padding:30px;text-align:center;color:var(--text-muted)">No products found</div>';return}
  el.innerHTML=`<table><thead><tr>
    <th class="sortable" onclick="toggleInvSort('ProductName')">Product ${si('ProductName')}</th>
    <th class="sortable" onclick="toggleInvSort('Club_Country')">Club ${si('Club_Country')}</th>
    <th class="sortable" onclick="toggleInvSort('Edition')">Edition ${si('Edition')}</th>
    <th class="sortable" onclick="toggleInvSort('Type')">Type ${si('Type')}</th>
    <th class="sortable" onclick="toggleInvSort('Size')">Size ${si('Size')}</th>
    <th class="sortable" onclick="toggleInvSort('CostPrice')">Cost ${si('CostPrice')}</th>
    <th class="sortable" onclick="toggleInvSort('SellPrice')">Sell ${si('SellPrice')}</th>
    <th class="sortable" onclick="toggleInvSort('Stock')">Stock ${si('Stock')}</th>
    <th>Health</th><th>Supplier</th><th>Actions</th>
  </tr></thead><tbody>${data.map(i=>{const stk=Number(i.Stock)||0;const mn=Number(i.MinStock)||5;const pct=Math.min(100,(stk/Math.max(mn*3,1))*100);const col=stk===0?'#dc2626':stk<=mn?'#d97706':'#059669';const isBatch=String(i.ID).match(/^PRD-\d+[A-Z]$/);
    return`<tr><td><strong>${esc(i.ProductName)}</strong><br><small style="color:var(--text-muted)">${esc(i.ID)}${isBatch?' <span class="badge badge-p" style="font-size:9px">Batch</span>':''}</small></td><td><span class="badge badge-i">${i.Club_Country||'-'}</span></td><td>${i.Edition||'-'}</td><td>${i.Type||'-'}</td><td>${i.Size||'-'}</td><td>${c}${Number(i.CostPrice).toLocaleString()}</td><td><strong>${c}${Number(i.SellPrice).toLocaleString()}</strong></td><td><strong>${stk}</strong></td><td><div class="stock-bar-c"><div class="stock-bar" style="width:${pct}%;background:${col}"></div></div>${stk===0?'<span class="badge badge-d">Out</span>':stk<=mn?'<span class="badge badge-w">Low</span>':'<span class="badge badge-s">OK</span>'}</td><td>${esc(i.SupplierName||'-')}</td><td><div class="btn-group"><button class="btn btn-outline btn-sm" onclick="openStockModal('${i.ID}',${stk})"><i class="fas fa-cubes"></i></button><button class="btn btn-outline btn-sm" onclick="editProduct('${i.ID}')"><i class="fas fa-pen"></i></button><button class="btn btn-danger btn-sm" onclick="delProduct('${i.ID}')"><i class="fas fa-trash"></i></button></div></td></tr>`}).join('')}</tbody></table>`;
}
function openProductModal(prod=null){let m=document.getElementById('productModal');if(m)m.remove();const isEdit=!!prod;document.body.insertAdjacentHTML('beforeend',`<div class="modal-overlay" id="productModal"><div class="modal"><div class="modal-hdr"><h3>${isEdit?'Edit':'Add'} Product</h3><button class="modal-close" onclick="closeModal('productModal')">&times;</button></div><div class="modal-body"><div class="fg">
  <div class="form-group"><label>Club/Country *</label><select class="fc" id="pClub"><option value="">Select</option>${makeOptions(CLUBS_COUNTRIES,prod?.Club_Country)}</select></div>
  <div class="form-group"><label>Edition</label><select class="fc" id="pEd">${makeOptions(EDITIONS,prod?.Edition)}</select></div>
  <div class="form-group"><label>Type</label><select class="fc" id="pType">${makeOptions(TYPES,prod?.Type)}</select></div>
  <div class="form-group"><label>Size</label><select class="fc" id="pSize">${makeOptions(SIZES,prod?.Size)}</select></div>
  <div class="form-group"><label>Color</label><input class="fc" id="pColor" value="${prod?.Color||''}"></div>
  <div class="form-group"><label>Cost Price</label><input type="number" class="fc" id="pCost" value="${prod?.CostPrice||''}"></div>
  <div class="form-group"><label>Sell Price</label><input type="number" class="fc" id="pSell" value="${prod?.SellPrice||''}"></div>
  <div class="form-group"><label>Stock</label><input type="number" class="fc" id="pStock" value="${prod?.Stock||0}"></div>
  <div class="form-group"><label>Min Stock</label><input type="number" class="fc" id="pMin" value="${prod?.MinStock||5}"></div>
  <div class="form-group"><label>Supplier</label><select class="fc" id="pSup"><option value="">None</option>${S.suppliers.map(s=>`<option value="${s.ID}" data-name="${esc(s.Name)}" ${s.ID===prod?.SupplierID?'selected':''}>${esc(s.Name)}</option>`).join('')}</select></div>
</div></div><div class="modal-foot"><button class="btn btn-outline" onclick="closeModal('productModal')">Cancel</button><button class="btn btn-primary" onclick="saveProduct('${prod?.ID||''}')"><i class="fas fa-save"></i>Save</button></div></div></div>`);openModal('productModal')}
function editProduct(id){const p=S.inventory.find(x=>x.ID===id);if(p)openProductModal(p)}
async function saveProduct(id){const supSel=document.getElementById('pSup');const data={ID:id,Club_Country:document.getElementById('pClub').value,Edition:document.getElementById('pEd').value,Type:document.getElementById('pType').value,Size:document.getElementById('pSize').value,Color:document.getElementById('pColor').value,CostPrice:document.getElementById('pCost').value,SellPrice:document.getElementById('pSell').value,Stock:document.getElementById('pStock').value,MinStock:document.getElementById('pMin').value,SupplierID:supSel.value,SupplierName:supSel.selectedOptions[0]?.dataset?.name||''};if(!data.Club_Country){toast('Club required','error');return}const r=await apiPost(id?'updateProduct':'addProduct',data);if(r.success){toast(id?'Updated!':'Added!');closeModal('productModal');renderPage('inventory')}}
async function delProduct(id){if(!confirm('Delete product?'))return;const r=await apiPost('deleteProduct',{ID:id});if(r.success){toast('Deleted');renderPage('inventory')}}

async function saveStock(id){const r=await apiPost('updateStock',{ID:id,mode:document.getElementById('stkMode').value,Stock:document.getElementById('stkQty').value});if(r.success){toast(`Stock: ${r.newStock}`);closeModal('stockModal');renderPage('inventory')}}

// Auto-fill supplier and prices when a product is selected
function onBatchProdChange() {
  const sel = document.getElementById('bProd');
  const opt = sel.selectedOptions[0];
  if (!opt || !opt.value) return;
  
  const supId = opt.dataset.supid;
  const supName = opt.dataset.supname;
  const supSel = document.getElementById('bSup');
  
  // Pre-select the original supplier (user can change if needed)
  if (supId) {
    for (let i = 0; i < supSel.options.length; i++) {
      if (supSel.options[i].value === supId) {
        supSel.selectedIndex = i;
        break;
      }
    }
  }
  
  // Pre-fill sell price for reference
  document.getElementById('bSell').placeholder = `Inherit ${C()}${Number(opt.dataset.sell).toLocaleString()}`;
}

async function saveBatch() {
  const ps = document.getElementById('bProd');
  if (!ps.value) { toast('Select a product', 'error'); return; }
  
  const ss_ = document.getElementById('bSup');
  const qty = Number(document.getElementById('bQty').value) || 0;
  const cost = Number(document.getElementById('bCost').value) || 0;
  
  if (qty <= 0) { toast('Enter quantity', 'error'); return; }
  if (cost <= 0) { toast('Enter cost price', 'error'); return; }
  
  const r = await apiPost('addBatch', {
    ProductID: ps.value,
    ProductName: ps.selectedOptions[0]?.dataset.name || '',
    SupplierID: ss_.value,
    SupplierName: ss_.selectedOptions[0]?.dataset.name || '',
    Quantity: qty,
    CostPrice: cost,
    SellPrice: document.getElementById('bSell').value,
    Notes: document.getElementById('bNotes').value
  });
  if (r.success) {
    toast(`Variant created: ${r.batchProductId}`);
    closeModal('batchModal');
    renderPage('inventory');
  }
}
  async function saveBatch(){const ps=document.getElementById('bProd');const ss=document.getElementById('bSup');const r=await apiPost('addBatch',{ProductID:ps.value,ProductName:ps.selectedOptions[0]?.dataset.name||'',SupplierID:ss.value,SupplierName:ss.selectedOptions[0]?.dataset.name||'',Quantity:document.getElementById('bQty').value,CostPrice:document.getElementById('bCost').value});if(r.success){toast(`Batch added: ${r.batchProductId||'OK'}`);closeModal('batchModal');renderPage('inventory')}}

function addPOSRow() {
  const tbody = document.getElementById('posItems');
  const tr = document.createElement('tr');
  const pD = S.settings.patchDefaultPrice || 50;
  const nD = S.settings.namePrintDefaultPrice || 100;
  
  // Filter for in-stock items AND sort alphabetically by product name
  const sortedProducts = S.inventory
    .filter(i => Number(i.Stock) > 0)
    .sort((a, b) => String(a.ProductName || '').localeCompare(String(b.ProductName || '')));
  
  tr.innerHTML = `
    <td><select class="pos-prod" onchange="onPOSProdChange(this)">
      <option value="">Select</option>
      ${sortedProducts.map(p => `<option value="${p.ID}" data-price="${p.SellPrice}" data-cost="${p.CostPrice}" data-name="${esc(p.ProductName)}" data-club="${p.Club_Country}" data-ed="${p.Edition}" data-type="${p.Type}" data-size="${p.Size}" data-stock="${p.Stock}">${esc(p.ProductName)} [${p.Stock}]</option>`).join('')}
    </select></td>
    <td><input type="checkbox" class="pos-patch cb" onchange="calcPOSTotal()"></td>
    <td><input class="pos-nameprint" placeholder="Name" oninput="calcPOSTotal()"></td>
    <td><input type="number" class="pos-patchprice" value="${pD}" onchange="calcPOSTotal()"></td>
    <td><input type="number" class="pos-nameprice" value="${nD}" onchange="calcPOSTotal()"></td>
    <td><input type="number" class="pos-price" value="0" onchange="calcPOSTotal()"></td>
    <td><input type="number" class="pos-cost" value="0" onchange="calcPOSTotal()"></td>
    <td><input type="number" class="pos-qty" value="1" min="1" onchange="calcPOSTotal()" style="width:50px"></td>
    <td><input class="pos-linetotal" value="0" readonly style="width:70px"></td>
    <td><button class="btn btn-danger btn-sm" onclick="this.closest('tr').remove();calcPOSTotal()"><i class="fas fa-times"></i></button></td>`;
  tbody.appendChild(tr);
}
  function onPOSProdChange(sel){const tr=sel.closest('tr');const opt=sel.selectedOptions[0];if(opt&&opt.value){tr.querySelector('.pos-price').value=opt.dataset.price||0;tr.querySelector('.pos-cost').value=opt.dataset.cost||0}calcPOSTotal()}
function calcPOSTotal(){
  let subtotal=0;
  document.querySelectorAll('#posItems tr').forEach(tr=>{const price=Number(tr.querySelector('.pos-price').value)||0;const qty=Number(tr.querySelector('.pos-qty').value)||0;const hasPatch=tr.querySelector('.pos-patch').checked;const hasName=tr.querySelector('.pos-nameprint').value.trim()!=='';const patchP=hasPatch?(Number(tr.querySelector('.pos-patchprice').value)||0):0;const nameP=hasName?(Number(tr.querySelector('.pos-nameprice').value)||0):0;const lineTotal=(price*qty)+((patchP+nameP)*qty);tr.querySelector('.pos-linetotal').value=lineTotal;subtotal+=lineTotal});
  const disc=Number(document.getElementById('posDisc').value)||0;
  // Affiliate
  let affDisc=0;const affCode=document.getElementById('posAffCode').value.trim();
  if(affCode){const aff=S.affiliates.find(a=>a.Code.toLowerCase()===affCode.toLowerCase()&&a.Active==='Yes');if(aff){affDisc=aff.DiscountType==='Fixed'?(Number(aff.DiscountValue)||0):Math.round(subtotal*(Number(aff.DiscountValue)||0)/100)}}
  document.getElementById('posAffDisc').value=affDisc;
  // Voucher
  let vchDisc=0;const vchCode=document.getElementById('posVchCode').value.trim();
  if(vchCode){const vch=S.vouchers.find(v=>v.Code&&v.Code.toLowerCase()===vchCode.toLowerCase()&&v.Active==='Yes');if(vch){const minOrd=Number(vch.MinOrder)||0;const maxUses=Number(vch.MaxUses)||0;if(subtotal>=minOrd&&(maxUses===0||Number(vch.TimesUsed)<maxUses)){vchDisc=vch.DiscountType==='Percentage'?Math.round(subtotal*(Number(vch.DiscountValue)||0)/100):(Number(vch.DiscountValue)||0)}}}
  document.getElementById('posVchDisc').value=vchDisc;
  // Delivery
  const delType=document.getElementById('posDel').value;let delCharge=0;
  if(delType==='Inside Dhaka')delCharge=Number(S.settings.deliveryInsideDhaka)||80;
  else if(delType==='Outside Dhaka')delCharge=Number(S.settings.deliveryOutsideDhaka)||150;
  else if(delType==='On Campus')delCharge=Number(S.settings.deliveryOnCampus)||0;
  document.getElementById('posDelCharge').value=delCharge;
  const grand=Math.max(0,subtotal-disc-affDisc-vchDisc+delCharge);
  const paid=Number(document.getElementById('posPaid').value)||0;
  document.getElementById('posSub').value=subtotal;document.getElementById('posTotal').value=grand;document.getElementById('posDue').value=Math.max(0,grand-paid);
}
function clearPOS(){document.getElementById('posCust').value='';document.getElementById('posCustPhone').value='';document.getElementById('posDisc').value=0;document.getElementById('posPaid').value=0;document.getElementById('posNotes').value='';document.getElementById('posAffCode').value='';document.getElementById('posVchCode').value='';document.getElementById('posDel').value='None';document.getElementById('posItems').innerHTML='';addPOSRow();calcPOSTotal()}
async function submitSale(){
  const items=[];document.querySelectorAll('#posItems tr').forEach(tr=>{const sel=tr.querySelector('.pos-prod');if(!sel.value)return;const opt=sel.selectedOptions[0];items.push({ProductID:sel.value,Club_Country:opt.dataset.club,Edition:opt.dataset.ed,Type:opt.dataset.type,Size:opt.dataset.size,Quantity:tr.querySelector('.pos-qty').value,UnitPrice:tr.querySelector('.pos-price').value,CostPrice:tr.querySelector('.pos-cost').value,Patch:tr.querySelector('.pos-patch').checked,PatchPrice:tr.querySelector('.pos-patchprice').value,NamePrint:tr.querySelector('.pos-nameprint').value,NamePrintPrice:tr.querySelector('.pos-nameprice').value})});
  if(!items.length){toast('Add items','error');return}
  const custSel=document.getElementById('posCust');const custOpt=custSel.selectedOptions[0];
  const payload={CustomerID:custSel.value,CustomerName:custOpt?(custOpt.dataset.name||custOpt.textContent):'Walk-in Customer',CustomerPhone:document.getElementById('posCustPhone').value,Items:items,TotalAmount:document.getElementById('posSub').value,Discount:document.getElementById('posDisc').value,AffiliateCode:document.getElementById('posAffCode').value,AffiliateDiscount:document.getElementById('posAffDisc').value,VoucherCode:document.getElementById('posVchCode').value,VoucherDiscount:document.getElementById('posVchDisc').value,DeliveryType:document.getElementById('posDel').value,DeliveryCharge:document.getElementById('posDelCharge').value,DeliveryAddress:document.getElementById('posDelAddr')?.value||'',PaidAmount:document.getElementById('posPaid').value,PaymentMethod:document.getElementById('posPayM').value,Notes:document.getElementById('posNotes').value};
  if(!confirm(`Complete sale of ${C()}${document.getElementById('posTotal').value}?`))return;
  const r=await apiPost('createSale',payload);
  if(r.success){toast(`Sale done! ${r.invoiceNo} | Profit: ${C()}${r.profit}${r.commission?' | Comm: '+C()+r.commission:''}`);showInvoice(r.invoiceNo,payload,items);clearPOS();S.inventory=await apiGet('getInventory')}
}

function showInvoice(invoiceNo, sd, items) {
  const c = C(); const s = S.settings;
  const total = Number(sd.TotalAmount);
  const disc = Number(sd.Discount);
  const affDisc = Number(sd.AffiliateDiscount) || 0;
  const vchDisc = Number(sd.VoucherDiscount) || 0;
  const delCharge = Number(sd.DeliveryCharge) || 0;
  const grand = total - disc - affDisc - vchDisc + delCharge;
  const paid = Number(sd.PaidAmount);
  const due = Math.max(0, grand - paid);
  const notes = sd.Notes || '';
  const dateStr = new Date().toLocaleDateString();
  const timeStr = new Date().toLocaleTimeString();

  // Full items HTML
  let itemsHtml = items.map((item, idx) => {
    const pN = buildPN(item.Club_Country, item.Type, item.Edition, item.Size);
    const qty = Number(item.Quantity); const up = Number(item.UnitPrice);
    const pP = item.Patch ? (Number(item.PatchPrice) || 0) : 0;
    const nP = item.NamePrint ? (Number(item.NamePrintPrice) || 0) : 0;
    const mod = (pP + nP) * qty;
    const lt = (up * qty) + mod;
    let mods = []; if (item.Patch) mods.push('Patch'); if (item.NamePrint) mods.push('Name: ' + item.NamePrint);
    return `<tr><td>${idx+1}</td><td>${esc(pN)}${mods.length?'<br><small style="color:#8b5cf6">'+mods.join(', ')+'</small>':''}</td><td>${c}${up.toLocaleString()}</td><td>${qty}</td><td>${mod>0?c+mod.toLocaleString():'-'}</td><td style="text-align:right">${c}${lt.toLocaleString()}</td></tr>`;
  }).join('');

  // Compact items HTML
  let compactItemsHtml = items.map((item, idx) => {
    const pN = buildPN(item.Club_Country, item.Type, item.Edition, item.Size);

function switchInvoiceView(mode) {
  const body = document.getElementById('invModalBody');
  if (!body) return;
  const btnC = document.getElementById('btnCompact');
  const btnF = document.getElementById('btnFull');
  if (mode === 'compact') {
    body.innerHTML = window._invCompactHTML || '';
    if (btnC) { btnC.style.borderColor = 'var(--primary)'; btnC.style.color = 'var(--primary)'; }
    if (btnF) { btnF.style.borderColor = ''; btnF.style.color = ''; }
  } else {
    body.innerHTML = window._invFullHTML || '';
    if (btnF) { btnF.style.borderColor = 'var(--primary)'; btnF.style.color = 'var(--primary)'; }
    if (btnC) { btnC.style.borderColor = ''; btnC.style.color = ''; }
  }
  window._invCurrentMode = mode;
}

function toggleAllReturnItems(masterChk) {
  document.querySelectorAll('#prItemsBody .pr-chk').forEach(chk => {
    chk.checked = masterChk.checked;
    onReturnRowToggle(chk);
  });
}

function onReturnRowToggle(chk) {
  const tr = chk.closest('tr');
  const qtyInput = tr.querySelector('.pr-qty');
  qtyInput.disabled = !chk.checked;
  if (!chk.checked) qtyInput.value = 1;
  recalcReturnRow(qtyInput);
}

function recalcReturnRow(qtyInput) {
  const tr = qtyInput.closest('tr');
  const chk = tr.querySelector('.pr-chk');
  const qtySold = Number(tr.dataset.qtysold) || 0;
  let retQty = Number(qtyInput.value) || 0;
  
  if (retQty > qtySold) { retQty = qtySold; qtyInput.value = qtySold; }
  if (retQty < 1) { retQty = 1; qtyInput.value = 1; }
  
  const up = Number(tr.dataset.unitprice) || 0;
  const modPerUnit = Number(tr.dataset.modperunit) || 0;
  const refund = chk.checked ? (up + modPerUnit) * retQty : 0;
  
  tr.querySelector('.pr-refund').textContent = C() + refund.toLocaleString();
  recalcReturnTotal();
}

function recalcReturnTotal() {
  let total = 0;
  document.querySelectorAll('#prItemsBody tr').forEach(tr => {
    const chk = tr.querySelector('.pr-chk');
    if (!chk.checked) return;
    const retQty = Number(tr.querySelector('.pr-qty').value) || 0;
    const up = Number(tr.dataset.unitprice) || 0;
    const modPerUnit = Number(tr.dataset.modperunit) || 0;
    total += (up + modPerUnit) * retQty;
  });
  document.getElementById('prTotalRefund').value = C() + total.toLocaleString();
}

async function submitPartialReturn(saleId, invoiceNo) {
  const returnItems = [];
  document.querySelectorAll('#prItemsBody tr').forEach(tr => {
    const chk = tr.querySelector('.pr-chk');
    if (!chk.checked) return;
    const retQty = Number(tr.querySelector('.pr-qty').value) || 0;
    if (retQty <= 0) return;
    returnItems.push({
      SalesItemID: tr.dataset.itemid,
      ProductID: tr.dataset.productid,
      ProductName: tr.dataset.productname,
      Edition: tr.dataset.edition,
      ReturnQty: retQty,
      UnitPrice: Number(tr.dataset.unitprice) || 0,
      CostPrice: Number(tr.dataset.costprice) || 0,
      ModPerUnit: Number(tr.dataset.modperunit) || 0
    });
  });
  
  if (!returnItems.length) { toast('Select at least one item to return', 'error'); return; }
  
  const isExchange = document.getElementById('prIsExchange').checked;
  const notes = document.getElementById('prNotes').value;
  const refundMethod = document.getElementById('prRefundMethod').value;
  
  const totalQty = returnItems.reduce((s, i) => s + i.ReturnQty, 0);
  if (!confirm(`Confirm partial return of ${totalQty} item(s) from ${invoiceNo}?\n\n${isExchange ? '⚠️ Marked as EXCHANGE — no refund will be issued.\n' : ''}This will:\n• Restore stock\n• Adjust customer totals\n• Reverse proportional commissions\n• Update sale records\n\nContinue?`)) return;
  
  const r = await apiPost('partialReverseSale', {
    SaleID: saleId,
    InvoiceNo: invoiceNo,
    Items: returnItems,
    IsExchange: isExchange,
    RefundMethod: refundMethod,
    Notes: notes
  });
  
  if (r.success) {
    toast(`Partial return processed! ${r.itemsReturned} item(s) returned. Refund: ${C()}${(r.refundAmount || 0).toLocaleString()}`);
    closeModal('partialReturnModal');
    S.sales = await apiGet('getSales');
    S.inventory = await apiGet('getInventory');
    filterSL();
  }
}

    return`<tr><td><strong style="color:var(--warning)">${v.Code}</strong></td><td>${esc(v.Name||'-')}</td><td><span class="badge badge-w">${dl}</span></td><td>${c}${Number(v.MinOrder||0).toLocaleString()}</td><td>${v.MaxUses||'∞'}</td><td>${v.TimesUsed||0}</td><td>${v.Active==='Yes'?'<span class="badge badge-s">Yes</span>':'<span class="badge badge-d">No</span>'}</td><td><div class="btn-group"><button class="btn btn-outline btn-sm" onclick="editVch('${v.ID}')"><i class="fas fa-pen"></i></button><button class="btn btn-danger btn-sm" onclick="delVch('${v.ID}')"><i class="fas fa-trash"></i></button></div></td></tr>`}).join('')}</tbody></table>`:'<div style="padding:30px;text-align:center;color:var(--text-muted)">No vouchers</div>'}</div></div></div>`;
}
function openVchModal(vch=null){let m=document.getElementById('vchModal');if(m)m.remove();document.body.insertAdjacentHTML('beforeend',`<div class="modal-overlay" id="vchModal"><div class="modal"><div class="modal-hdr"><h3>${vch?'Edit':'Add'} Voucher</h3><button class="modal-close" onclick="closeModal('vchModal')">&times;</button></div><div class="modal-body"><div class="fg">
  <div class="form-group"><label>Code *</label><input class="fc" id="vcCode" value="${vch?.Code||''}"></div>
  <div class="form-group"><label>Name</label><input class="fc" id="vcName" value="${vch?.Name||''}"></div>
  <div class="form-group"><label>Type</label><select class="fc" id="vcType"><option value="Fixed" ${vch?.DiscountType==='Fixed'?'selected':''}>Fixed (${C()})</option><option value="Percentage" ${vch?.DiscountType==='Percentage'?'selected':''}>Percentage (%)</option></select></div>
  <div class="form-group"><label>Value</label><input type="number" class="fc" id="vcVal" value="${vch?.DiscountValue||0}"></div>
  <div class="form-group"><label>Min Order</label><input type="number" class="fc" id="vcMin" value="${vch?.MinOrder||0}"></div>
  <div class="form-group"><label>Max Uses (0=unlimited)</label><input type="number" class="fc" id="vcMax" value="${vch?.MaxUses||0}"></div>
  <div class="form-group"><label>Active</label><select class="fc" id="vcActive"><option value="Yes" ${vch?.Active!=='No'?'selected':''}>Yes</option><option value="No" ${vch?.Active==='No'?'selected':''}>No</option></select></div>
</div></div><div class="modal-foot"><button class="btn btn-outline" onclick="closeModal('vchModal')">Cancel</button><button class="btn btn-primary" onclick="saveVch('${vch?.ID||''}')"><i class="fas fa-save"></i>Save</button></div></div></div>`);openModal('vchModal')}
function editVch(id){const v=S.vouchers.find(x=>x.ID===id);if(v)openVchModal(v)}
async function saveVch(id){const data={ID:id,Code:document.getElementById('vcCode').value,Name:document.getElementById('vcName').value,DiscountType:document.getElementById('vcType').value,DiscountValue:document.getElementById('vcVal').value,MinOrder:document.getElementById('vcMin').value,MaxUses:document.getElementById('vcMax').value,Active:document.getElementById('vcActive').value==='Yes'};if(!data.Code){toast('Code required','error');return}const r=await apiPost(id?'updateVoucher':'addVoucher',data);if(r.success){toast('Saved!');closeModal('vchModal');renderPage('vouchers')}}
async function delVch(id){if(!confirm('Delete?'))return;const r=await apiPost('deleteVoucher',{ID:id});if(r.success){toast('Deleted');renderPage('vouchers')}}

// ============================================================
// SETTINGS (with delivery charges)
// ============================================================
async function renderSettings(area){
  S.settings=await apiGet('getSettings');const s=S.settings;
  area.innerHTML=`<div class="card"><div class="card-hdr"><h3><i class="fas fa-gear" style="color:var(--text-muted);margin-right:6px"></i>Settings</h3></div><div class="card-body"><div class="fg">
    <div class="form-group"><label>Business Name</label><input class="fc" id="stBiz" value="${s.businessName||'Fan Field'}"></div>
    <div class="form-group"><label>Motto</label><input class="fc" id="stMotto" value="${s.motto||'Home of Authentic & Quality Jerseys'}"></div>
    <div class="form-group"><label>Currency</label><input class="fc" id="stCur" value="${s.currency||'৳'}"></div>
    <div class="form-group"><label>Invoice Prefix</label><input class="fc" id="stPfx" value="${s.invoicePrefix||'FF-'}"></div>
    <div class="form-group"><label>Next Invoice #</label><input type="number" class="fc" id="stNum" value="${s.nextInvoiceNum||1001}"></div>
    <div class="form-group"><label>Phone</label><input class="fc" id="stPhone" value="${s.phone||''}"></div>
    <div class="form-group"><label>Address</label><input class="fc" id="stAddr" value="${s.address||''}"></div>
    <div class="form-group"><label>Patch Sell Price</label><input type="number" class="fc" id="stPatch" value="${s.patchDefaultPrice||150}"></div>
    <div class="form-group"><label>Patch Cost</label><input type="number" class="fc" id="stPatchCost" value="${s.patchDefaultCost||130}"></div>
    <div class="form-group"><label>Name Print Sell</label><input type="number" class="fc" id="stName" value="${s.namePrintDefaultPrice||150}"></div>
    <div class="form-group"><label>Name Print Cost</label><input type="number" class="fc" id="stNameCost" value="${s.namePrintDefaultCost||130}"></div>
    <div class="form-group" style="grid-column:1/-1"><h4 style="font-size:13px;color:var(--primary);margin:10px 0 6px">Delivery Charges</h4></div>
    <div class="form-group"><label>Inside Dhaka (${C()})</label><input type="number" class="fc" id="stDelIn" value="${s.deliveryInsideDhaka||80}"></div>
    <div class="form-group"><label>Outside Dhaka (${C()})</label><input type="number" class="fc" id="stDelOut" value="${s.deliveryOutsideDhaka||150}"></div>
    <div class="form-group"><label>On Campus (${C()})</label><input type="number" class="fc" id="stDelCampus" value="${s.deliveryOnCampus||0}"></div>
  </div><button class="btn btn-primary" onclick="saveSets()" style="margin-top:14px"><i class="fas fa-save"></i>Save Settings</button></div></div>`;
}
async function saveSets(){const settings={businessName:document.getElementById('stBiz').value,motto:document.getElementById('stMotto').value,currency:document.getElementById('stCur').value,invoicePrefix:document.getElementById('stPfx').value,nextInvoiceNum:document.getElementById('stNum').value,phone:document.getElementById('stPhone').value,address:document.getElementById('stAddr').value,patchDefaultPrice:document.getElementById('stPatch').value,patchDefaultCost:document.getElementById('stPatchCost').value,namePrintDefaultPrice:document.getElementById('stName').value,namePrintDefaultCost:document.getElementById('stNameCost').value,deliveryInsideDhaka:document.getElementById('stDelIn').value,deliveryOutsideDhaka:document.getElementById('stDelOut').value,deliveryOnCampus:document.getElementById('stDelCampus').value};const r=await apiPost('updateSettings',{settings});if(r.success){toast('Saved!');S.currency=settings.currency;S.settings=settings}}

// INIT
document.addEventListener('DOMContentLoaded',()=>renderPage('dashboard'));
document.addEventListener('click',e=>{if(e.target.classList.contains('modal-overlay'))e.target.classList.remove('active')});
</script>
</body>
